version: 2

updates:
  # Keep GitHub Actions pinned to current major versions.
  # Grouped: all action bumps arrive as ONE pull request per week, not one each.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Dev/test Python tooling (the offline governance copilot + validator).
  # Grouped the same way: one pull request per week for all pip bumps.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    groups:
      python:
        patterns:
          - "*"
