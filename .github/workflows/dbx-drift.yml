name: DBX Platform — Drift Detection

# `terragrunt run-all plan -detailed-exitcode` per cloud. Exit code 2 means the
# live infrastructure has drifted from the committed state — a GitHub issue is
# opened (or updated) with the offending cloud.
#
# Dispatch-only, deliberately. Drift detection is only meaningful against a
# DEPLOYED platform, and this one is torn down by default (it exists to be stood
# up and destroyed). A weekly schedule against a non-existent stack cannot read
# the secrets the stack itself creates, so it would fail every Monday and paint a
# standing red ✗ on a public repo for a platform that isn't there. Run it by hand
# (or from the deploy job) while the platform is up. The `schedule:` trigger was
# removed for exactly this reason.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

jobs:
  drift:
    name: Drift check (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt plan (detailed exit code)
        id: plan
        working-directory: environments/dev/${{ matrix.cloud }}
        env:
          TERRAGRUNT_DOWNLOAD: /tmp/.terragrunt-cache
        run: |
          set +e
          terragrunt run-all plan -detailed-exitcode --terragrunt-non-interactive 2>&1 | tee /tmp/drift.txt
          code=${PIPESTATUS[0]}
          echo "exitcode=${code}" >> "$GITHUB_OUTPUT"
          # 0 = clean, 2 = drift; anything else is a real failure.
          if [ "$code" != "0" ] && [ "$code" != "2" ]; then exit "$code"; fi

      - name: Open drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v9
        with:
          script: |
            const cloud = "${{ matrix.cloud }}";
            const title = `Drift detected: ${cloud} (dev)`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "drift",
            });
            const body = [
              `Scheduled drift check found differences between the committed`,
              `configuration and the live **${cloud}** infrastructure.`,
              ``,
              `Run locally to inspect:`,
              "```bash",
              `cd environments/dev/${cloud} && terragrunt run-all plan`,
              "```",
              ``,
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["drift"],
              });
            }
