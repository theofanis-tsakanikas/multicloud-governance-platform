name: DBX Config — Validate (offline)

# Pre-flight validation of the domain governance JSON config + the deterministic
# access-policy gate.
#
# This COMPLEMENTS dbx-validate.yml (which is OIDC-gated and runs Terraform /
# Terragrunt / Checkov / tfsec). This job needs NO cloud credentials — it only
# parses JSON + HCL, analyzes the access policy, and runs pytest, so it gives
# fast, free feedback on the config that drives the whole platform.

on:
  pull_request:
    paths:
      - "environments/dev/domains/**"
      - "environments/dev/policy_exceptions.json"
      - "environments/dev/cost_assumptions.json"
      - "environments/dev/**/data_platform/dbx_governance/terragrunt.hcl"
      - "environments/dev/**/data_platform/snowflake_governance/terragrunt.hcl"
      - "infra/snowflake/**"
      - "scripts/**"
      - "schema/**"
      - "policy/**"
      - "docs/governance/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - ".github/workflows/dbx-config-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate domain config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the policy SARIF to the Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # ── The guard that should have existed from the start ────────────────────────────────────
      #
      # dbx-validate.yml carried a YAML syntax error from the commit that introduced it: two lines
      # of a shell heredoc sat at column 1 inside a `run: |` block, which terminates the block
      # scalar, and the `>` that followed was then read as a folded-scalar indicator.
      #
      # GitHub does not warn you about this. It cannot parse the file, so it cannot read the
      # workflow's `name`, so the badge renders the file path instead of the name — and it records a
      # failed run on every push. Twenty runs, twenty failures, and not one of them ever executed a
      # step. Checkov, tfsec, terraform fmt, terragrunt validate and Infracost were configured,
      # believed in, and silently absent from every pull request the repository ever had.
      #
      # A gate you think you have and do not is worse than no gate, because you stop looking. So the
      # credential-free job now parses every workflow file before anything else runs.
      - name: Every workflow file is valid YAML
        run: |
          python - <<'PY'
          import glob, sys, yaml

          bad = []
          for path in sorted(glob.glob(".github/workflows/*.yml")):
              try:
                  spec = yaml.safe_load(open(path))
              except yaml.YAMLError as exc:
                  bad.append((path, str(exc).splitlines()[0]))
                  continue
              if not isinstance(spec, dict) or "jobs" not in spec:
                  bad.append((path, "parsed, but declares no jobs"))
                  continue
              print(f"  ok  {path}  ({spec.get('name', '<unnamed>')})")

          if bad:
              print("\n::error::workflow files that GitHub will not be able to run:")
              for path, why in bad:
                  print(f"::error file={path}::{why}")
              sys.exit(1)
          PY

      - name: Install conftest (OPA cross-check)
        run: |
          CONFTEST_VERSION=0.56.0
          curl -sSfL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz conftest
          sudo mv conftest /usr/local/bin/

      - name: Ruff lint
        run: ruff check scripts tests

      - name: Ruff format check
        run: ruff format --check scripts tests

      - name: Validate domain config (offline — structural + JSON Schema)
        run: python scripts/validate_domains.py

      - name: Access-policy analysis (deterministic gate — fails on unacknowledged HIGH)
        run: python scripts/policy_analyzer.py --warn-expiring 30

      - name: Cross-backend consistency (Unity Catalog ≡ Snowflake, engine-agnostic proof)
        run: python scripts/snowflake_backend.py --check

      - name: OPA / Conftest cross-check (independent second opinion)
        run: make opa

      - name: Governance docs are in sync with the config
        run: python scripts/governance_report.py --check

      - name: Genie copilot artifacts are in sync with the config
        run: python scripts/genie_space.py --check

      - name: Governance metrics are in sync with the config
        run: python scripts/governance_metrics.py --check

      - name: Cost estimate is in sync with the config
        run: python scripts/cost_estimate.py --check

      - name: Build data warehouse + profile (Level B — offline sqlite)
        run: |
          python pipelines/generate_data.py
          python pipelines/medallion.py

      - name: Data profile is in sync with the config
        run: python pipelines/profile_data.py --check

      - name: Governance dashboard is in sync with the artifacts
        run: python scripts/governance_dashboard.py --check

      - name: Run test suite
        run: pytest -q

      - name: Generate policy SARIF
        if: always()
        run: python scripts/policy_analyzer.py --format sarif --output policy.sarif

      - name: Upload policy findings to the Security tab
        if: always()
        continue-on-error: true # needs code-scanning (GHAS) which private repos may lack; the analyzer exit code above is the real gate
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: policy.sarif
          category: uc-policy-analyzer
