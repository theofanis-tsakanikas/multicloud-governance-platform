name: DBX Platform — Validate

on:
  pull_request:
    paths:
      - "infra/**"
      - "environments/**"
      - "terragrunt.hcl"
      - ".github/workflows/dbx-validate.yml"

  # This workflow gates pull requests, so it only runs on one. That is correct — and it means the
  # badge in the README shows whatever the last PR left behind, which for a repo developed on main
  # can be nothing at all, or something months stale. workflow_dispatch is how you refresh it
  # without opening a PR you do not need.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

# ── WHY THIS IS TWO JOBS AND NOT ONE ────────────────────────────────────────────────────────────
#
# It used to be one matrix job that ran, in order: fmt → hclfmt → `terragrunt run-all validate` →
# Checkov → tfsec. The first time it ever executed (it had shipped with a YAML syntax error and had
# never once run), it failed at `validate` — and Checkov and tfsec were SKIPPED.
#
# That ordering had the gate backwards. Checkov and tfsec read the Terraform in `infra/` as text.
# They need no credentials, no state, and no deployed platform. They are the checks that can always
# run, and they are the ones that catch a bucket left public or a security group open to the world.
#
# `terragrunt run-all validate` is the opposite. This platform fetches every secret at parse time
# through `run_cmd` (ADR-0002), which means Terragrunt shells out to the AWS, Azure and GCP CLIs
# before it can even read the config — so validate needs all three clouds' credentials AND a
# deployed stack, because the secrets it reads are created BY that stack:
#
#     ResourceNotFoundException ... GetSecretValue: sales/rds-secret
#
# On a torn-down platform that is not a finding. It is the absence of a platform. Failing the gate on
# it would mean the only way to keep the badge green is to leave ~$18/day of infrastructure standing,
# which is a bad trade for a check that fmt and Checkov largely subsume.
#
# So the static scans are their own job and they gate. Validate is a second job, best-effort, and it
# says out loud when it could not run rather than pretending something is wrong.

jobs:
  static:
    name: Static analysis (no credentials)
    runs-on: ubuntu-latest
    # Deliberately no `permissions: id-token`. This job authenticates to nothing, which is also why
    # it is the one that still works on a pull request from a fork.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/

      - name: Terragrunt HCL format check
        run: terragrunt hclfmt --check --diff

      # These two are the gate. They run on every PR, they need nothing, and they fail the build.
      - name: Security scan — Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          soft_fail: false
          output_format: github_failed_only

      - name: Security scan — tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra

  validate:
    name: Terragrunt validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    needs: static
    # Best-effort: it cannot run against a torn-down platform, and that is not a defect worth a red
    # badge. It reports; it does not gate. The step below says which of the two it was.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]

    steps:
      - uses: actions/checkout@v4

      # All three, always: remote state is in S3, and the Azure and GCP seed credentials are read
      # from AWS Secrets Manager at parse time (CLAUDE.md gotcha #5). An AWS-only login is why the
      # azure and gcp legs used to die on `Please run 'az login'`.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt validate — ${{ matrix.cloud }}
        working-directory: environments/dev/${{ matrix.cloud }}
        env:
          TERRAGRUNT_DOWNLOAD: /tmp/.terragrunt-cache
        run: |
          if terragrunt run-all validate --terragrunt-non-interactive 2>/tmp/tg.err; then
            echo "::notice::terragrunt validate passed for ${{ matrix.cloud }}"
            exit 0
          fi
          # Tell the two apart, because they mean opposite things.
          if grep -qiE "GetSecretValue|ResourceNotFoundException|detected no outputs|az login|gcloud auth" /tmp/tg.err; then
            echo "::warning::${{ matrix.cloud }} is not deployed — validate cannot parse a config whose secrets the stack itself creates (ADR-0002). This is the absence of a platform, not a defect. Static analysis above is the gate."
            exit 0
          fi
          echo "::error::terragrunt validate found a real problem in ${{ matrix.cloud }}"
          tail -40 /tmp/tg.err
          exit 1
          soft_fail: false

  infracost:
    name: Cost estimate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3

      - name: Generate cost estimate
        run: |
          infracost breakdown \
            --path infra/aws/modules \
            --recursive \
            --format json \
            --out-file /tmp/infracost.json \
            --no-cache 2>&1 \
          || echo "::warning::Infracost scan incomplete — some resources may be unpriced"

      - name: Post cost estimate comment
        if: hashFiles('/tmp/infracost.json') != ''
        run: |
          estimate=$(infracost output \
            --path /tmp/infracost.json \
            --format github-comment 2>/dev/null \
            || echo "_Unable to render estimate — check workflow logs._")
          body="## Cost estimate

          > **Scope:** \`infra/aws/modules\` only. Databricks, Azure, and GCP resources are not priced by Infracost.

          $estimate"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$body" --edit-last 2>/dev/null \
          || gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$body" \
          || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
