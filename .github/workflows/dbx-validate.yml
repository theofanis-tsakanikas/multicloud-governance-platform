name: DBX Platform — Validate

on:
  # Both, deliberately.
  #
  # `pull_request` is where the gate BLOCKS — that is the merge it refuses. `push` to main is where
  # the gate STAYS HONEST: without it the README badge reports the last pull request rather than the
  # current state of main, and any commit that lands directly (which, in a repository developed on
  # main, is most of them) is never checked at all.
  #
  # The gate was inert for 122 commits before this push trigger existed.
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "environments/**"
      - "terragrunt.hcl"
      - ".checkov.yml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/dbx-validate.yml"

  # NO `paths:` filter here — deliberately, and this one is a trap worth naming.
  #
  # `Static analysis` is a REQUIRED status check in the branch ruleset. A required check whose
  # workflow is path-filtered can never satisfy a pull request that touches none of those paths: the
  # workflow does not run, so the check never reports, so GitHub waits forever for a status that will
  # never arrive. The pull request sits at "Expected — Waiting for status to be reported" and CANNOT
  # BE MERGED — not blocked by a finding, blocked by silence.
  #
  # (This is not hypothetical. It stranded two pull requests in this repository: one whose net diff
  # was empty after a revert, and one that only touched an Azure terragrunt file.)
  #
  # A required check must be able to report on EVERY pull request. So this runs on every pull
  # request. It is credential-free and finishes in under a minute. `push` keeps its paths — nothing
  # is required there.
  pull_request:

  # workflow_dispatch refreshes the badge without opening a PR you do not need.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

# ── WHY THIS IS TWO JOBS AND NOT ONE ────────────────────────────────────────────────────────────
#
# It used to be one matrix job that ran, in order: fmt → hclfmt → `terragrunt run-all validate` →
# Checkov → tfsec. The first time it ever executed (it had shipped with a YAML syntax error and had
# never once run), it failed at `validate` — and Checkov and tfsec were SKIPPED.
#
# That ordering had the gate backwards. Checkov and tfsec read the Terraform in `infra/` as text.
# They need no credentials, no state, and no deployed platform. They are the checks that can always
# run, and they are the ones that catch a bucket left public or a security group open to the world.
#
# `terragrunt run-all validate` is the opposite. This platform fetches every secret at parse time
# through `run_cmd` (ADR-0002), which means Terragrunt shells out to the AWS, Azure and GCP CLIs
# before it can even read the config — so validate needs all three clouds' credentials AND a
# deployed stack, because the secrets it reads are created BY that stack:
#
#     ResourceNotFoundException ... GetSecretValue: sales/rds-secret
#
# On a torn-down platform that is not a finding. It is the absence of a platform. Failing the gate on
# it would mean the only way to keep the badge green is to leave ~$18/day of infrastructure standing,
# which is a bad trade for a check that fmt and Checkov largely subsume.
#
# So the static scans are their own job and they gate. Validate is a second job, best-effort, and it
# says out loud when it could not run rather than pretending something is wrong.

jobs:
  static:
    name: Static analysis (no credentials)
    runs-on: ubuntu-latest
    # Deliberately no `permissions: id-token`. This job authenticates to nothing, which is also why
    # it is the one that still works on a pull request from a fork.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/

      - name: Terragrunt HCL format check
        run: terragrunt hclfmt --check --diff

      # These two are the gate. They run on every PR, they need nothing, and they fail the build.
      #
      # .checkov.yml is a SKIP-list, not an allow-list: only the IDs named in it are suppressed, and
      # each one carries the reason it is. A new Checkov rule — or an existing one firing on new
      # code — still fails this build. The default is that the gate applies.
      - name: Security scan — Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          config_file: .checkov.yml
          soft_fail: false
          output_format: github_failed_only

      # tfsec is the second, independent infra scanner. .tfsec.yml is a documented SKIP-list (the same
      # deliberate trade-offs as .checkov.yml, under tfsec's own rule names); a new finding still fails.
      - name: Security scan — tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          additional_args: --config-file .tfsec.yml

  validate:
    name: Terragrunt validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    needs: static
    # Best-effort: it cannot run against a torn-down platform, and that is not a defect worth a red
    # badge. It reports; it does not gate. The step below says which of the two it was.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]

    steps:
      - uses: actions/checkout@v4

      # All three, always: remote state is in S3, and the Azure and GCP seed credentials are read
      # from AWS Secrets Manager at parse time (CLAUDE.md gotcha #5). An AWS-only login is why the
      # azure and gcp legs used to die on `Please run 'az login'`.
      # Both logins are `continue-on-error` on purpose: a missing token is a PRECONDITION we do not
      # have, not a finding about the Terraform. The step after this one turns that into an explicit
      # warning instead of a red X that says nothing about the code under review.
      - name: Configure AWS credentials (OIDC)
        id: aws_auth
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      # Azure federated credentials match ONE subject exactly — there is no wildcard, unlike the AWS
      # trust policy (`repo:owner/repo:*`) and the GCP workload-identity condition. So a credential
      # registered for `ref:refs/heads/main` does NOT cover `pull_request`, and the token request
      # fails with AADSTS700213 on every pull request until a `pull_request` entity is added in Entra.
      # That is a registration that is missing, not a defect in this repository.
      - name: Configure Azure credentials
        id: azure_auth
        if: matrix.cloud == 'azure'
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt validate — ${{ matrix.cloud }}
        working-directory: environments/dev/${{ matrix.cloud }}
        env:
          TERRAGRUNT_DOWNLOAD: /tmp/.terragrunt-cache
        run: |
          # 1. No credentials is a PRECONDITION we lack, not a finding. Two ways it happens, both
          #    legitimate: a pull request from a fork (OIDC secrets are withheld from forks, by
          #    design), and an Azure federated credential that does not cover this event's subject.
          #    Neither tells you anything about the Terraform, so neither earns a red X.
          if [ "${{ steps.aws_auth.outcome }}" != "success" ]; then
            echo "::warning::${{ matrix.cloud }}: no AWS token for this event (fork pull request, or the OIDC role does not trust this subject). terragrunt validate needs one — remote state lives in S3. Static analysis is the gate and it ran."
            exit 0
          fi
          if [ "${{ matrix.cloud }}" = "azure" ] && [ "${{ steps.azure_auth.outcome }}" != "success" ]; then
            echo "::warning::azure: no Entra token for this event. Azure federated credentials match one subject exactly (no wildcard, unlike AWS/GCP), so a credential for refs/heads/main does not cover pull_request — add a 'Pull request' federated credential in Entra to enable this leg. Static analysis is the gate and it ran."
            exit 0
          fi

          # 2. Authenticated. Now the two outcomes that actually mean something.
          if terragrunt run-all validate --terragrunt-non-interactive 2>/tmp/tg.err; then
            echo "::notice::terragrunt validate passed for ${{ matrix.cloud }}"
            exit 0
          fi
          # The platform being absent is not the same as the config being wrong.
          if grep -qiE "GetSecretValue|ResourceNotFoundException|detected no outputs|az login|gcloud auth" /tmp/tg.err; then
            echo "::warning::${{ matrix.cloud }} is not deployed — validate cannot parse a config whose secrets the stack itself creates (ADR-0002). This is the absence of a platform, not a defect. Static analysis above is the gate."
            exit 0
          fi
          echo "::error::terragrunt validate found a real problem in ${{ matrix.cloud }}"
          tail -40 /tmp/tg.err
          exit 1

  infracost:
    name: Cost estimate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v4

      # Infracost needs an API key (free, self-hosted) and prices AWS only. Without the key it must
      # NOT pretend: it says so and stops, rather than soft-failing to a green job that priced nothing
      # (which is the "a gate you think you have and don't" trap this repo is built to refuse). The
      # deterministic, key-free scripts/cost_estimate.py — run in dbx-config-validate — prices the WHOLE
      # platform (Databricks + all three clouds + a carbon floor) and is the real cost surface;
      # Infracost is a bonus AWS cross-check for whoever sets INFRACOST_API_KEY.
      - name: Generate cost estimate
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          if [ -z "$INFRACOST_API_KEY" ]; then
            echo "::notice::Infracost skipped — no INFRACOST_API_KEY set. scripts/cost_estimate.py (in DBX Config — Validate) prices the platform without a key."
            exit 0
          fi
          infracost breakdown \
            --path infra/aws/modules \
            --format json \
            --out-file /tmp/infracost.json \
            --no-cache 2>&1 \
          || echo "::warning::Infracost scan incomplete — some resources may be unpriced"

      - name: Post cost estimate comment
        if: hashFiles('/tmp/infracost.json') != ''
        run: |
          estimate=$(infracost output \
            --path /tmp/infracost.json \
            --format github-comment 2>/dev/null \
            || echo "_Unable to render estimate — check workflow logs._")
          body="## Cost estimate

          > **Scope:** \`infra/aws/modules\` only. Databricks, Azure, and GCP resources are not priced by Infracost.

          $estimate"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$body" --edit-last 2>/dev/null \
          || gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$body" \
          || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
