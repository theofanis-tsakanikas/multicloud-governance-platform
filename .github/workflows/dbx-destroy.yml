name: DBX Platform — Destroy

# Destroy is the mirror of Deploy, and it is not symmetric with it. Two differences
# drive everything below:
#
#   1. It runs the layers in REVERSE. data_platform holds the Databricks objects
#      that depend on the storage credential, which depends on the IAM role, which
#      depends on the network. Unwind in the order you wound.
#
#   2. Skipping a layer is not free. In a deploy, a skipped layer is one that is
#      already there. In a destroy, a skipped layer is a live resource whose state
#      you are about to orphan. Every skip is printed as a warning.
#
# `mode: plan` shows exactly what would be removed and removes nothing. For an
# irreversible operation that is worth more than any resume switch, so it is the
# default.
#
# The bootstrap stack is deliberately NOT destroyable from here. It owns the
# metastore, the service principal and the secrets every other layer authenticates
# with; unwinding it is a different and riskier operation than unwinding a cloud
# stack, and it is not part of the deploy/destroy loop this workflow serves.

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud stack to destroy"
        required: true
        type: choice
        options: [aws, azure, gcp]

      mode:
        description: "plan = show what would be destroyed, change nothing. destroy = do it."
        required: true
        type: choice
        options: [plan, destroy]
        default: plan

      start_from:
        description: "Begin at this layer and continue DOWNWARDS to foundation. Layers above it are left standing."
        required: true
        type: choice
        options: [data_platform, integration, storage, security, network, foundation]
        default: data_platform

      confirm:
        description: "Type DESTROY to confirm (ignored when mode = plan)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

jobs:
  guard:
    name: Confirmation gate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.mode }}" = "plan" ]; then
            echo "::notice::mode=plan — nothing will be destroyed."
            exit 0
          fi
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::mode=destroy requires typing DESTROY exactly."
            exit 1
          fi
          echo "::warning::Destroying ${{ inputs.cloud }} from ${{ inputs.start_from }} downwards."

  destroy:
    name: ${{ inputs.mode }} ${{ inputs.cloud }} from ${{ inputs.start_from }}
    runs-on: ubuntu-latest
    needs: guard
    environment: dev

    env:
      # snowflake_governance lives under aws/data_platform, so an AWS destroy has to
      # authenticate to Snowflake exactly as the AWS deploy does. Without these the
      # provider fails before it can drop the database, the roles or the resource
      # monitor — leaving them orphaned, and the monitor still counting credits.
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - uses: actions/checkout@v4

      # Required for every cloud, not just AWS: remote state lives in S3, and the
      # Azure and GCP seed credentials are read from AWS Secrets Manager at parse
      # time (CLAUDE.md gotcha #5).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials (Azure only)
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ARM_* must exist ONLY for Azure. The databricks provider reads them as an
      # Azure credential, finds client_id/client_secret as well, and refuses:
      # "more than one authorization method configured: azure and oauth". Setting
      # them at job level poisoned the GCP and AWS runs.
      - name: Export ARM_* (Azure only)
        if: inputs.cloud == 'azure'
        run: |
          {
            echo "ARM_USE_OIDC=true"
            echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}"
            echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}"
            echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          } >> "$GITHUB_ENV"

      # The mssql_schemas layer opens a real SQL connection to read the database
      # before it can destroy anything in it. At deploy time the mssql layer adds
      # the running machine's IP to the firewall (orch_ip); at destroy time nothing
      # applies that rule, and every runner has a different IP — so the destroy is
      # locked out of the server it is trying to delete. Open the door for this
      # runner; it disappears with the server.
      # In PUBLIC mode the runner reaches Azure SQL over its public endpoint, and needs its own IP on
      # the firewall to do it. In PRIVATE mode there is no public endpoint, and Azure refuses to even
      # discuss the firewall — the rules would be meaningless, so it will not let you write one:
      #
      #     ERROR: (DenyPublicEndpointEnabled) Unable to create or modify firewall rules when public
      #     network interface for the server is disabled
      #
      # which failed the whole destroy job on its second step. Ask the server which mode it is in.
      - name: Allow this runner through the SQL firewall (Azure, public mode only)
        if: inputs.cloud == 'azure'
        run: |
          set -euo pipefail
          SRV=$(az sql server list --query "[0].name" -o tsv 2>/dev/null || true)
          RG=$(az sql server list --query "[0].resourceGroup" -o tsv 2>/dev/null || true)
          if [ -z "$SRV" ]; then
            echo "::notice::no SQL server found — nothing to allow"
            exit 0
          fi
          PUBLIC=$(az sql server show -g "$RG" -n "$SRV" --query "publicNetworkAccess" -o tsv)
          if [ "$PUBLIC" != "Enabled" ]; then
            echo "::notice::Azure SQL is private (publicNetworkAccess=${PUBLIC}) — no firewall to open, and none allowed"
            exit 0
          fi
          IP=$(curl -fsS https://api.ipify.org)
          echo "::notice::allowing $IP on $SRV"
          az sql server firewall-rule create -g "$RG" -s "$SRV" \
            -n "gh-runner-destroy" --start-ip-address "$IP" --end-ip-address "$IP" -o none

      # T-SQL has no DROP SCHEMA ... CASCADE, and the pgssoft/mssql provider exposes no
      # equivalent of the postgres provider's `drop_cascade` (which is how the AWS side
      # survives this — see infra/aws/modules/storage/rds_schemas). So `mssql_schema`'s
      # destroy fails outright while the schema still holds the seeded tables:
      #
      #     mssql: Cannot drop schema 'orders' because it is being referenced by object
      #
      # The tables were never Terraform's. The pipeline seeds them into a SIMULATED source
      # system (ADR-0014); the pipeline is therefore what unseeds them. Terraform owns the
      # schema, the seed owns the rows, and the teardown mirrors the setup.
      #
      # And it has to reach the database to do it, which in private mode the runner cannot: there is
      # no public endpoint and no firewall rule that would grant one. So the unseed goes where the
      # seed already goes — a one-shot task on the transit gateway, inside the VPC, across the VPN.
      # Same statement, same schemas; only the road in changes. (The gateway speaks sqlcmd rather
      # than pymssql, hence drop_seed.sql rather than drop_seed.py — the same discovery logic, in
      # the language of the path that can still reach the server.)
      #
      # This runs BEFORE terragrunt destroy, which is what makes it possible: the gateway that
      # carries it is in `integration`, still standing, and is torn down later in the same job.
      - name: Unseed the source system — Azure SQL (Terraform cannot drop a non-empty schema)
        if: inputs.cloud == 'azure' && inputs.mode == 'destroy'
        run: |
          set -euo pipefail
          SRV=$(az sql server list --query "[0].name" -o tsv 2>/dev/null || true)
          RG=$(az sql server list --query "[0].resourceGroup" -o tsv 2>/dev/null || true)
          KV=$(az keyvault list --query "[0].name" -o tsv 2>/dev/null || true)
          if [ -z "$SRV" ] || [ -z "$KV" ]; then
            echo "::notice::no SQL server or key vault — nothing to unseed"
            exit 0
          fi

          PUBLIC=$(az sql server show -g "$RG" -n "$SRV" --query "publicNetworkAccess" -o tsv)
          if [ "$PUBLIC" != "Enabled" ]; then
            echo "::notice::Azure SQL is private — unseeding from inside the VPC, through the gateway"
            .github/scripts/azure-sql-task.sh sql "$(cat pipelines/sources/azure_sql/drop_seed.sql)"
            exit 0
          fi

          echo "::notice::Azure SQL is public — unseeding from the runner"
          PW=$(az keyvault secret show --vault-name "$KV" --name sql-admin-password --query value -o tsv)
          echo "::add-mask::$PW"

          python3 -m pip install --quiet pymssql
          SQL_SERVER="$SRV.database.windows.net" \
          SQL_DATABASE="sqldb-product-catalog" \
          SQL_USER="sql_vault_admin" \
          SQL_PASSWORD="$PW" \
            python3 pipelines/sources/azure_sql/drop_seed.py

      # The same lesson as the Azure unseed above, in a different engine. Terraform owns the
      # Snowflake stage; it does not own the EXTERNAL TABLE the demo built on top of it:
      #
      #     093694: Stage loc_sales_gold cannot be dropped ... it has active External table(s)
      #
      # That table — and the masking demo's PII table, its policy, and the notebook — live in
      # the `demo` schema, whose own COMMENT says it is "Not governed by the domain contract.
      # Demo scaffolding only." Scaffolding comes down before the building does.
      - name: Drop the Snowflake demo scaffolding (AWS only — it sits on Terraform's stages)
        if: inputs.cloud == 'aws' && inputs.mode == 'destroy'
        env:
          SNOWFLAKE_ACCOUNT: SNOWFLAKE_LOCATOR_REDACTED
        run: |
          set -euo pipefail
          python3 -m pip install --quiet snowflake-connector-python
          python3 pipelines/snowflake/drop_demo.py

      # rds_schemas holds `postgresql_schema` resources, and the postgres provider
      # opens a connection to read them before it can destroy them. A stopped RDS
      # instance refuses that connection, so the destroy of a database's schemas
      # requires the database to be running -- even though the very next layer
      # deletes the instance outright. The mirror of the Azure SQL firewall step.
      - name: Start the RDS instance (AWS only)
        if: inputs.cloud == 'aws'
        run: |
          set -euo pipefail
          ID=sales-db-instance
          STATUS=$(aws rds describe-db-instances --db-instance-identifier "$ID" \
            --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo "absent")
          echo "::notice::$ID is $STATUS"
          case "$STATUS" in
            absent)   echo "nothing to start"; exit 0 ;;
            available) exit 0 ;;
            stopped)  aws rds start-db-instance --db-instance-identifier "$ID" >/dev/null ;;
          esac
          echo "waiting for $ID to become available (up to ~10 min)"
          aws rds wait db-instance-available --db-instance-identifier "$ID"
          echo "::notice::$ID is available"

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && sudo mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O tg && chmod +x tg && sudo mv tg /usr/local/bin/terragrunt

      - name: ${{ inputs.mode }} — ${{ inputs.cloud }}
        working-directory: environments/dev/${{ inputs.cloud }}
        run: |
          # Reverse of the deploy order. run-all resolves the fine-grained order
          # inside each directory from the dependency graph.
          LAYERS="data_platform integration storage security network foundation"

          reached=0
          for dir in $LAYERS; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::warning::LEFT STANDING: $dir (start_from=${{ inputs.start_from }}). Its resources still exist."
              continue
            fi
            [ -d "$dir" ] || { echo "::notice::no $dir layer in ${{ inputs.cloud }}"; continue; }

            echo "::group::${{ inputs.mode }} $dir"
            if [ "${{ inputs.mode }}" = "plan" ]; then
              terragrunt run-all plan -destroy --terragrunt-non-interactive --terragrunt-working-dir "$dir"
            else
              terragrunt run-all destroy --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            fi
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "### ${{ inputs.mode }} — ${{ inputs.cloud }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Cloud | \`${{ inputs.cloud }}\` |"
            echo "| Mode | \`${{ inputs.mode }}\` |"
            echo "| Started at | \`${{ inputs.start_from }}\` (and downwards) |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo ""
            if [ "${{ inputs.mode }}" = "destroy" ]; then
              echo "> Databricks object names are stable (ADR-0013). After a destroy some"
              echo "> control-plane objects linger briefly in a soft-deleted state, so"
              echo "> re-deploying the same name immediately can collide. Wait for the purge,"
              echo "> or purge via the API."
              echo ">"
              echo "> The bootstrap stack was not touched: it still owns the metastore, the"
              echo "> service principal and the secrets."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
