name: DBX Platform — Destroy

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud stack to destroy"
        required: true
        type: choice
        options: [aws, azure, gcp]
      layer:
        description: "Specific layer (optional). Empty = full stack destroy."
        required: false
        type: string
        default: ""
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.0"
  TERRAGRUNT_VERSION: "0.75.0"
  WORKING_DIR: databricks-platform-v2

jobs:
  guard:
    name: Confirmation gate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::You must type DESTROY exactly to proceed."
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with destroy of ${{ inputs.cloud }}/${{ inputs.layer || 'full stack' }}."

  destroy:
    name: Destroy ${{ inputs.cloud }} ${{ inputs.layer || '(full stack)' }}
    runs-on: ubuntu-latest
    needs: guard
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials (Azure only)
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Destroy — ${{ inputs.cloud }} ${{ inputs.layer || 'full stack' }}
        working-directory: ${{ env.WORKING_DIR }}/environments/dev/${{ inputs.cloud }}/${{ inputs.layer }}
        run: |
          if [ -n "${{ inputs.layer }}" ]; then
            terragrunt destroy --terragrunt-non-interactive -auto-approve
          else
            terragrunt run-all destroy --terragrunt-non-interactive -auto-approve
          fi
        env:
          ARM_USE_OIDC: ${{ inputs.cloud == 'azure' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Summary
        run: |
          echo "### Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Cloud: **${{ inputs.cloud }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Layer: **${{ inputs.layer || 'full stack' }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Update \`deployment_id_${{ inputs.cloud }}\` in \`config.hcl\` before re-deploying." >> $GITHUB_STEP_SUMMARY
