name: DBX Pipeline — deploy + run medallion (output-driven, SP auth)

# One-click data run, the professional way: nothing is copied by hand.
#   • Workspace URL + SQL warehouse id are read from the bootstrap Terraform
#     OUTPUTS (they are created by the deploy, not by you).
#   • Auth is the SERVICE PRINCIPAL (the bootstrap seed) via M2M OAuth — no
#     personal PAT, no manual DATABRICKS_* secrets.
# The only secret this needs is DBX_DEPLOY_ROLE_ARN (already used by deploy),
# which also grants read of the seed from Secrets Manager.
#
# Prereq: the platform is deployed (bootstrap has run) so the outputs exist.

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target workspace"
        type: choice
        options: [aws, gcp]
        default: aws
      run_job:
        description: "Also run the job after deploy?"
        type: boolean
        default: true
      seed_sources:
        description: >-
          Seed the SIMULATED source systems before running (ADR-0014). In a real
          deployment the application teams own this data and you set it to false.
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"
  AWS_REGION: eu-central-1

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt + Databricks CLI
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && sudo mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" -O tg
          chmod +x tg && sudo mv tg /usr/local/bin/terragrunt
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh

      - name: Resolve host + warehouse from Terraform outputs, SP creds from Secrets Manager
        run: |
          set -euo pipefail
          CLOUD="${{ inputs.cloud }}"
          if [ "$CLOUD" = "aws" ]; then
            HOST=$(cd environments/dev/bootstrap/aws/platform && terragrunt output -raw serverless_workspace_url --terragrunt-non-interactive)
            WID=$(cd environments/dev/bootstrap/aws/config && terragrunt output -raw warehouse_id --terragrunt-non-interactive)
            # The SAME service principal Terraform authenticates as, which is
            # therefore the OWNER of every catalog, connection and external location
            # the medallion touches. The bootstrap seed is a different identity: it
            # exists to create the metastore and the automation SP, and it holds no
            # privileges on the objects that SP went on to create.
            #
            #     shared_gcp_delta_share owner = d23c34cf...  (the automation SP)
            #     bootstrap seed               = 1c2c2d24...  (no USE CATALOG)
            #
            # GCP never hit this because there the bootstrap seed IS the identity
            # Terraform uses.
            SEED=databricks/spn/dev/spn_credentials
          else
            HOST=$(cd environments/dev/bootstrap/gcp/platform && terragrunt output -raw gcp_serverless_workspace_url --terragrunt-non-interactive)
            WID=$(cd environments/dev/bootstrap/gcp/config && terragrunt output -raw warehouse_id --terragrunt-non-interactive)
            SEED=gcp/bootstrap/seed_credentials
          fi
          CREDS=$(aws secretsmanager get-secret-value --secret-id "$SEED" --query SecretString --output text)
          CID=$(echo "$CREDS" | jq -r .client_id)
          CSEC=$(echo "$CREDS" | jq -r .client_secret)
          echo "::add-mask::$CSEC"
          # M2M OAuth for the Databricks CLI + the target host for the bundle:
          echo "DATABRICKS_HOST=$HOST"                >> "$GITHUB_ENV"
          echo "DATABRICKS_CLIENT_ID=$CID"            >> "$GITHUB_ENV"
          echo "DATABRICKS_CLIENT_SECRET=$CSEC"       >> "$GITHUB_ENV"
          echo "WAREHOUSE_ID=$WID"                    >> "$GITHUB_ENV"

      # ── Seeding the SIMULATED source systems (ADR-0014) ────────────────────
      #
      # This is not the platform's job. It is the application teams' data, and it
      # lives here for exactly one reason: this repo pretends to own the source
      # systems so it can be deployed from an empty account. `seed_sources: false`
      # is what a real deployment sets.
      #
      # It runs HERE, and not in the deploy, because the deploy does not need it:
      # `warm_foreign_catalog` asks for SHOW SCHEMAS, not for rows. The Azure stack
      # deployed green with `inventory` and `orders` completely empty. Data belongs
      # to the run, not to the infrastructure.
      #
      # Each script is idempotent (DROP + CREATE) and deterministic (no random, no
      # now()), so the medallion's row counts and reject counts are reproducible.

      - name: Seed the source system — Postgres (AWS)
        if: ${{ inputs.cloud == 'aws' && inputs.seed_sources }}
        run: |
          set -euo pipefail
          PGHOST=$(aws rds describe-db-instances --db-instance-identifier sales-db-instance \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          PGPASSWORD=$(aws secretsmanager get-secret-value --secret-id "sales/rds-secret" \
            --query SecretString --output text | jq -r .password)
          echo "::add-mask::$PGPASSWORD"
          export PGHOST PGPASSWORD PGSSLMODE=require
          psql -U sales_admin -d salesdb -v ON_ERROR_STOP=1 -q -f pipelines/sources/rds/seed.sql
          psql -U sales_admin -d salesdb -c \
            "SELECT 'customers' AS t, count(*) FROM crm.customers UNION ALL SELECT 'orders', count(*) FROM orders.orders;"

      # `az` needs its own login; ARM_* only configures the terraform provider.
      # Scoped to this step and the next so no other step ever sees ARM_*.
      - name: Azure login (to reach the SQL server and Key Vault)
        if: ${{ inputs.cloud == 'aws' && inputs.seed_sources }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The AWS medallion joins supply_sql_master ACROSS its two schemas, so the
      # Azure source has to hold rows even when the target workspace is on AWS.
      - name: Seed the source system — Azure SQL (the AWS medallion reads it)
        if: ${{ inputs.cloud == 'aws' && inputs.seed_sources }}
        run: |
          set -euo pipefail
          SRV=$(az sql server list --query "[0].name" -o tsv)
          RG=$(az sql server list --query "[0].resourceGroup" -o tsv)
          KV=$(az keyvault list --query "[0].name" -o tsv)

          # Same reason the destroy needs it: every runner has a different IP, and
          # the firewall only knows the one that ran the deploy.
          IP=$(curl -fsS https://api.ipify.org)
          az sql server firewall-rule create -g "$RG" -s "$SRV" \
            -n "gh-runner-seed" --start-ip-address "$IP" --end-ip-address "$IP" -o none

          PW=$(az keyvault secret show --vault-name "$KV" --name sql-admin-password --query value -o tsv)
          echo "::add-mask::$PW"

          python3 -m pip install --quiet pymssql
          SQL_SERVER="$SRV.database.windows.net" \
          SQL_DATABASE="sqldb-product-catalog" \
          SQL_USER="sql_vault_admin" \
          SQL_PASSWORD="$PW" \
            python3 pipelines/sources/azure_sql/apply_seed.py

      - name: Seed the source system — BigQuery (GCP)
        if: ${{ inputs.cloud == 'gcp' && inputs.seed_sources }}
        run: |
          set -euo pipefail
          # The GCP seed key lives in AWS Secrets Manager (CLAUDE.md gotcha #5).
          KEY_FILE="$RUNNER_TEMP/gcp-seed.json"
          aws secretsmanager get-secret-value --secret-id "gcp/bootstrap/seed_credentials" \
            --query SecretString --output text | jq -r '.provider_key' > "$KEY_FILE"
          PROJECT=$(jq -r '.project_id' "$KEY_FILE")
          gcloud auth activate-service-account --key-file="$KEY_FILE" --quiet
          rm -f "$KEY_FILE"

          bq query --project_id="$PROJECT" --use_legacy_sql=false --quiet \
            < pipelines/sources/bigquery/seed.sql
          bq query --project_id="$PROJECT" --use_legacy_sql=false --format=pretty \
            'SELECT (SELECT COUNT(*) FROM analytics.sessions) AS sessions,
                    (SELECT COUNT(*) FROM web.visitors)      AS visitors'

      - name: Deploy the bundle (creates notebooks + jobs in the workspace)
        working-directory: pipelines/databricks
        run: databricks bundle deploy -t ${{ inputs.cloud }} --var "warehouse_id=${WAREHOUSE_ID}"

      - name: Run the medallion job
        if: ${{ inputs.run_job }}
        working-directory: pipelines/databricks
        run: databricks bundle run "medallion_${{ inputs.cloud }}" -t ${{ inputs.cloud }} --var "warehouse_id=${WAREHOUSE_ID}"

      # `bundle deploy` creates the AI/BI dashboard as a DRAFT. Publishing is a
      # separate step the bundle does not do, so without this the dashboard opens
      # in the editor rather than as a clean published page. Publish it here, so the
      # moment the AWS run finishes the dashboard is live at its /published URL.
      # AWS only (the dashboard is scoped to the AWS target); non-fatal.
      - name: Publish the executive dashboard (AWS only)
        if: ${{ inputs.cloud == 'aws' }}
        run: |
          set -euo pipefail
          # The CLI authenticates with M2M OAuth, so mint a bearer token the REST
          # API accepts from the same client_id/secret the bundle used.
          TOK=$(curl -s -X POST "$DATABRICKS_HOST/oidc/v1/token" \
            -u "$DATABRICKS_CLIENT_ID:$DATABRICKS_CLIENT_SECRET" \
            -d 'grant_type=client_credentials&scope=all-apis' | jq -r .access_token)
          DID=$(curl -s -H "Authorization: Bearer $TOK" \
            "$DATABRICKS_HOST/api/2.0/lakeview/dashboards?page_size=100" \
            | jq -r '.dashboards[]? | select(.display_name | contains("Multi-Cloud Executive View")) | .dashboard_id' | head -1)
          if [ -z "$DID" ]; then echo "::warning::dashboard not found — skipping publish"; exit 0; fi
          curl -s -X POST -H "Authorization: Bearer $TOK" -H 'Content-Type: application/json' \
            "$DATABRICKS_HOST/api/2.0/lakeview/dashboards/$DID/published" \
            -d "{\"warehouse_id\":\"$WAREHOUSE_ID\"}" >/dev/null \
            && echo "::notice::dashboard published → $DATABRICKS_HOST/dashboardsv3/$DID/published" \
            || echo "::warning::publish call failed (dashboard still deployed as draft)"

      # The Snowflake equivalent of "the bundle uploaded the notebook": stage the
      # governance demo .ipynb and create a Snowsight Notebook over it, so the
      # Snowflake side is open-and-Run-all too. AWS-only, and NON-FATAL — a failure
      # here (network policy, MFA, a missing object) must never fail the data run.
      - name: Deploy the Snowflake demo notebook (AWS only)
        if: ${{ inputs.cloud == 'aws' }}
        continue-on-error: true
        run: |
          python3 -m pip install --quiet snowflake-connector-python
          python3 pipelines/snowflake/deploy_notebook.py
        env:
          SNOWFLAKE_ACCOUNT: SNOWFLAKE_LOCATOR_REDACTED
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: DEV_SALES_WH
