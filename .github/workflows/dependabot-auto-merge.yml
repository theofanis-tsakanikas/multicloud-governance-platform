# Auto-merge Dependabot pull requests once the required checks pass.
#
# Scope on purpose: only PATCH and MINOR bumps merge themselves. MAJOR bumps
# (which can change behaviour) are left OPEN for a human to review — the whole
# point of this repo is that nothing risky ships unreviewed.
#
# `--auto` does not bypass branch protection: GitHub still waits for the two
# required checks (Static analysis, Validate domain config) to go green, then
# squash-merges. If a check fails, the PR stays open.
name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for patch & minor
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
