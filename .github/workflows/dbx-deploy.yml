name: DBX Platform — Deploy

on:
  workflow_dispatch:
    inputs:
      # One tri-state selector per cloud: it encodes BOTH "deploy this cloud?"
      # and "with what connectivity?". "skip" = don't touch it. So "all public"
      # = set all three to public; mixed (e.g. aws=private, gcp=public) is native.
      aws:
        description: "AWS — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip
      azure:
        description: "Azure — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip
      gcp:
        description: "GCP — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

jobs:
  deploy-aws:
    name: Deploy AWS
    runs-on: ubuntu-latest
    if: inputs.aws != 'skip'
    environment: dev
    env:
      PRIVATE_AWS: ${{ inputs.aws == 'private' }}
      # Snowflake governance (second enforcement backend) lives under the AWS tree,
      # so the AWS deploy provisions it too. org/account come from config.hcl in the
      # generated provider; user/password/role are injected here (secrets-at-runtime).
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — AWS (full stack)
        working-directory: environments/dev/aws
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve

  deploy-azure:
    name: Deploy Azure
    runs-on: ubuntu-latest
    if: inputs.azure != 'skip'
    environment: dev
    env:
      PRIVATE_AZURE: ${{ inputs.azure == 'private' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — Azure
        working-directory: environments/dev/azure
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-gcp:
    name: Deploy GCP
    runs-on: ubuntu-latest
    if: inputs.gcp != 'skip'
    environment: dev
    env:
      PRIVATE_GCP: ${{ inputs.gcp == 'private' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — GCP
        working-directory: environments/dev/gcp
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve
