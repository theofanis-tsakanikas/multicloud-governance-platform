name: DBX Platform — Deploy

on:
  workflow_dispatch:
    inputs:
      # One tri-state selector per cloud: it encodes BOTH "deploy this cloud?"
      # and "with what connectivity?". "skip" = don't touch it. So "all public"
      # = set all three to public; mixed (e.g. aws=private, gcp=public) is native.
      aws:
        description: "AWS — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip
      azure:
        description: "Azure — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip
      gcp:
        description: "GCP — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip

      # Debugging aid, NOT the normal path. Terraform is idempotent, so a full run
      # is always correct — but re-running four already-applied layers to reach the
      # fifth costs minutes per iteration. Starting later runs that layer AND every
      # layer after it; the skipped layers' outputs are read from remote state, so
      # they must already be applied. Leave at `foundation` for a real deploy.
      start_from:
        description: "Start from this layer (and continue to the end). Use `foundation` for a full deploy."
        required: true
        type: choice
        options: [foundation, network, security, storage, integration, data_platform]
        default: foundation

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

jobs:
  deploy-aws:
    name: Deploy AWS
    runs-on: ubuntu-latest
    if: inputs.aws != 'skip'
    environment: dev
    env:
      PRIVATE_AWS: ${{ inputs.aws == 'private' }}
      # Snowflake governance (second enforcement backend) lives under the AWS tree,
      # so the AWS deploy provisions it too. org/account come from config.hcl in the
      # generated provider; user/password/role are injected here (secrets-at-runtime).
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — AWS (full stack)
        working-directory: environments/dev/aws
        run: |
          # Apply top-level dirs in dependency order. Secrets created in an earlier
          # dir (e.g. security/secrets_manager) exist before a later dir fetches them
          # at parse time; run-all within each dir resolves the fine-grained order.
          # (run-all across the WHOLE cloud fails on a fresh env: it parses secret-
          # fetching layers before the secret-creating layer has applied.)
          reached=0
          for dir in foundation network security storage integration data_platform; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::notice::skipping $dir (start_from=${{ inputs.start_from }}); its outputs are read from remote state"
              continue
            fi
            [ -d "$dir" ] || continue
            echo "::group::apply $dir"
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            echo "::endgroup::"
          done

  deploy-azure:
    name: Deploy Azure
    runs-on: ubuntu-latest
    if: inputs.azure != 'skip'
    environment: dev
    env:
      PRIVATE_AZURE: ${{ inputs.azure == 'private' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — Azure
        working-directory: environments/dev/azure
        run: |
          # Apply top-level dirs in dependency order. Secrets created in an earlier
          # dir (e.g. security/secrets_manager) exist before a later dir fetches them
          # at parse time; run-all within each dir resolves the fine-grained order.
          # (run-all across the WHOLE cloud fails on a fresh env: it parses secret-
          # fetching layers before the secret-creating layer has applied.)
          reached=0
          for dir in foundation network security storage integration data_platform; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::notice::skipping $dir (start_from=${{ inputs.start_from }}); its outputs are read from remote state"
              continue
            fi
            [ -d "$dir" ] || continue
            echo "::group::apply $dir"
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            echo "::endgroup::"
          done
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-gcp:
    name: Deploy GCP
    runs-on: ubuntu-latest
    if: inputs.gcp != 'skip'
    environment: dev
    env:
      PRIVATE_GCP: ${{ inputs.gcp == 'private' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      # The GCP seed service-account key lives in AWS Secrets Manager, not in GCP —
      # the bootstrap has to reach GCP before GCP's own secret store is usable
      # (CLAUDE.md gotcha #5). Terraform gets it as `provider_key` through the
      # generated provider; the gcloud CLI needs its own activation, because
      # dbx_bq_connector resolves the BigQuery SA key with
      # `gcloud secrets versions access` at plan time.
      # The GCP seed service-account key lives in AWS Secrets Manager, not in GCP —
      # the bootstrap has to reach GCP before GCP's own secret store is usable
      # (CLAUDE.md gotcha #5). Terraform receives it as `provider_key` through the
      # generated provider, but the gcloud CLI needs its own activation: the
      # dbx_bq_connector layer resolves the BigQuery SA key with
      # `gcloud secrets versions access` at plan time.
      - name: Authenticate gcloud with the seed service account
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/gcp-seed.json"
          aws secretsmanager get-secret-value --secret-id "gcp/bootstrap/seed_credentials" \
            --query SecretString --output text | jq -r '.provider_key' > "$KEY_FILE"
          gcloud auth activate-service-account --key-file="$KEY_FILE" --quiet
          gcloud config set project "$(jq -r '.project_id' "$KEY_FILE")" --quiet
          rm -f "$KEY_FILE"
          gcloud auth list --filter=status:ACTIVE --format='value(account)'

      - name: Apply — GCP
        working-directory: environments/dev/gcp
        run: |
          # Apply top-level dirs in dependency order. Secrets created in an earlier
          # dir (e.g. security/secrets_manager) exist before a later dir fetches them
          # at parse time; run-all within each dir resolves the fine-grained order.
          # (run-all across the WHOLE cloud fails on a fresh env: it parses secret-
          # fetching layers before the secret-creating layer has applied.)
          reached=0
          for dir in foundation network security storage integration data_platform; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::notice::skipping $dir (start_from=${{ inputs.start_from }}); its outputs are read from remote state"
              continue
            fi
            [ -d "$dir" ] || continue
            echo "::group::apply $dir"
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            echo "::endgroup::"
          done
