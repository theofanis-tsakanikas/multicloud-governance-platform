name: DBX Platform — Deploy

on:
  workflow_dispatch:
    inputs:
      # One tri-state selector per cloud: it encodes BOTH "deploy this cloud?"
      # and "with what connectivity?". "skip" = don't touch it. So "all public"
      # = set all three to public; mixed (e.g. aws=private, gcp=public) is native.
      aws:
        description: "AWS — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip
      azure:
        description: "Azure — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip
      gcp:
        description: "GCP — skip, or deploy public / private"
        required: true
        type: choice
        options: [skip, public, private]
        default: skip

      # Debugging aid, NOT the normal path. Terraform is idempotent, so a full run
      # is always correct — but re-running four already-applied layers to reach the
      # fifth costs minutes per iteration. Starting later runs that layer AND every
      # layer after it; the skipped layers' outputs are read from remote state, so
      # they must already be applied. Leave at `foundation` for a real deploy.
      start_from:
        description: "Start from this layer (and continue to the end). Use `foundation` for a full deploy."
        required: true
        type: choice
        options: [foundation, network, security, storage, integration, data_platform]
        default: foundation

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.75.0"

jobs:
  deploy-aws:
    name: Deploy AWS
    runs-on: ubuntu-latest
    if: inputs.aws != 'skip'
    environment: dev
    env:
      PRIVATE_AWS: ${{ inputs.aws == 'private' }}
      # Snowflake governance (second enforcement backend) lives under the AWS tree,
      # so the AWS deploy provisions it too. org/account come from config.hcl in the
      # generated provider; user/password/role are injected here (secrets-at-runtime).
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      # The account locator is NOT in the repo. Together org + account resolve to a working
      # snowflakecomputing.com login page, and a public repository should not hand anyone the one
      # thing they cannot guess: where to knock. config.hcl reads both from the environment.
      SNOWFLAKE_ORGANIZATION: ${{ secrets.SNOWFLAKE_ORGANIZATION }}
      SNOWFLAKE_ACCOUNT_NAME: ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — AWS (full stack)
        working-directory: environments/dev/aws
        env:
          AWS_REGION: eu-central-1
          ECR_REPO: pgbouncer-gateway
          ENVIRONMENT: dev
        run: |
          # Apply top-level dirs in dependency order. Secrets created in an earlier
          # dir (e.g. security/secrets_manager) exist before a later dir fetches them
          # at parse time; run-all within each dir resolves the fine-grained order.
          # (run-all across the WHOLE cloud fails on a fresh env: it parses secret-
          # fetching layers before the secret-creating layer has applied.)
          #
          # PRIVATE MODE adds two things Terraform cannot do for itself, and they are
          # interleaved here rather than hung off the end because *where* they run is the
          # whole point — each sits in the one gap where its prerequisite exists and its
          # consumer does not yet:
          #
          #   after foundation   the ECR repository exists, so the gateway image can be
          #                      built and pushed — before integration's ECS service tries
          #                      to pull it. Nothing in this repo ever built that image; the
          #                      task crash-looped behind a green apply.
          #
          #   after integration  the cluster exists, so the schemas can be created from a
          #                      one-shot task INSIDE the VPC — before data_platform's
          #                      federated grants warm the foreign catalog and need them.
          #                      A private RDS has no public address: this is the only door.
          repo_root="$GITHUB_WORKSPACE"
          reached=0
          for dir in foundation network security storage integration data_platform; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::notice::skipping $dir (start_from=${{ inputs.start_from }}); its outputs are read from remote state"
              continue
            fi
            [ -d "$dir" ] || continue
            echo "::group::apply $dir"
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            echo "::endgroup::"

            if [ "${PRIVATE_AWS}" = "true" ] && [ "$dir" = "foundation" ]; then
              echo "::group::private — build and push the RDS gateway image"
              ( cd "$repo_root" && bash .github/scripts/aws-private-gateway-image.sh )
              echo "::endgroup::"
            fi

            if [ "${PRIVATE_AWS}" = "true" ] && [ "$dir" = "integration" ]; then
              echo "::group::private — create the RDS schemas from inside the VPC"
              ( cd "$repo_root" && bash .github/scripts/aws-private-rds-schemas.sh )
              echo "::endgroup::"
            fi
          done

  deploy-azure:
    name: Deploy Azure
    runs-on: ubuntu-latest
    if: inputs.azure != 'skip'
    environment: dev
    env:
      PRIVATE_AZURE: ${{ inputs.azure == 'private' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — Azure
        working-directory: environments/dev/azure
        run: |
          # Apply top-level dirs in dependency order. Secrets created in an earlier
          # dir (e.g. security/secrets_manager) exist before a later dir fetches them
          # at parse time; run-all within each dir resolves the fine-grained order.
          # (run-all across the WHOLE cloud fails on a fresh env: it parses secret-
          # fetching layers before the secret-creating layer has applied.)
          #
          # PRIVATE MODE (transit hub) adds two steps Terraform cannot do itself, each in the one
          # gap where its prerequisite exists and its consumer does not yet — the mirror of the
          # AWS private steps:
          #
          #   after network      the ECR repo exists (inside aws_network), so the sql-gateway
          #                      image is built and pushed before integration's ECS service pulls it.
          #   after integration  the gateway is up, so the Azure SQL schemas are created from a
          #                      one-shot task INSIDE the VPC — before data_platform's federated
          #                      grants warm the foreign catalog. A private Azure SQL has no other door.
          repo_root="$GITHUB_WORKSPACE"
          reached=0
          for dir in foundation network security storage integration data_platform; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::notice::skipping $dir (start_from=${{ inputs.start_from }}); its outputs are read from remote state"
              continue
            fi
            [ -d "$dir" ] || continue
            echo "::group::apply $dir"
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            echo "::endgroup::"

            if [ "${PRIVATE_AZURE}" = "true" ] && [ "$dir" = "network" ]; then
              echo "::group::private — build and push the SQL transit-gateway image"
              ( cd "$repo_root" && bash .github/scripts/azure-sql-gateway-image.sh )
              echo "::endgroup::"
            fi

            if [ "${PRIVATE_AZURE}" = "true" ] && [ "$dir" = "integration" ]; then
              echo "::group::private — create the Azure SQL schemas from inside the VPC"
              ( cd "$repo_root" && bash .github/scripts/azure-sql-schemas.sh )
              echo "::endgroup::"
            fi
          done
        env:
          AWS_REGION: eu-central-1
          ECR_REPO: sql-gateway
          ENVIRONMENT: dev
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-gcp:
    name: Deploy GCP
    runs-on: ubuntu-latest
    if: inputs.gcp != 'skip'
    environment: dev
    env:
      PRIVATE_GCP: ${{ inputs.gcp == 'private' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Apply — GCP
        working-directory: environments/dev/gcp
        env:
          AWS_REGION: eu-central-1
          ECR_REPO: bq-gateway
        run: |
          # Apply top-level dirs in dependency order. Secrets created in an earlier
          # dir (e.g. security/secrets_manager) exist before a later dir fetches them
          # at parse time; run-all within each dir resolves the fine-grained order.
          # (run-all across the WHOLE cloud fails on a fresh env: it parses secret-
          # fetching layers before the secret-creating layer has applied.)
          #
          # PRIVATE MODE adds one step Terraform cannot do for itself, in the one gap where its
          # prerequisite exists and its consumer does not yet: after `network` the ECR repository
          # exists, so the BigQuery gateway image is built and pushed before integration's ECS
          # service tries to pull it. There is no schema step here, unlike AWS and Azure — BigQuery
          # stays reachable from CI over the Google API with IAM, so the seed never needed the VPC.
          repo_root="$GITHUB_WORKSPACE"
          reached=0
          for dir in foundation network security storage integration data_platform; do
            if [ "$dir" = "${{ inputs.start_from }}" ]; then reached=1; fi
            if [ "$reached" -eq 0 ]; then
              echo "::notice::skipping $dir (start_from=${{ inputs.start_from }}); its outputs are read from remote state"
              continue
            fi
            [ -d "$dir" ] || continue
            echo "::group::apply $dir"
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve --terragrunt-working-dir "$dir"
            echo "::endgroup::"

            if [ "${PRIVATE_GCP}" = "true" ] && [ "$dir" = "network" ]; then
              echo "::group::private — build and push the BigQuery transit-gateway image"
              ( cd "$repo_root" && bash .github/scripts/gcp-bq-gateway-image.sh )
              echo "::endgroup::"
            fi
          done
