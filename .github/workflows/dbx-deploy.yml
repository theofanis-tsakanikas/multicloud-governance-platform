name: DBX Platform — Deploy

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud(s) to deploy"
        required: true
        type: choice
        options: [aws, azure, gcp, aws-azure, aws-gcp, all]
      connectivity:
        description: "Connectivity mode"
        required: true
        type: choice
        options: [public, private]
        default: public
      start_from_layer:
        description: "Start from layer (e.g. foundation, security/iam, storage/rds). Leave empty for full stack."
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.0"
  TERRAGRUNT_VERSION: "0.75.0"

jobs:
  deploy-aws:
    name: Deploy AWS
    runs-on: ubuntu-latest
    if: contains(fromJSON('["aws","aws-azure","aws-gcp","all"]'), inputs.cloud)
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Plan — AWS ${{ inputs.start_from_layer || 'full stack' }}
        working-directory: environments/dev/aws/${{ inputs.start_from_layer }}
        run: |
          if [ -n "${{ inputs.start_from_layer }}" ]; then
            terragrunt plan --terragrunt-non-interactive
          else
            terragrunt run-all plan --terragrunt-non-interactive
          fi
        env:
          TF_VAR_is_private_connection: ${{ inputs.connectivity == 'private' }}

      - name: Apply — AWS
        working-directory: environments/dev/aws/${{ inputs.start_from_layer }}
        run: |
          if [ -n "${{ inputs.start_from_layer }}" ]; then
            terragrunt apply --terragrunt-non-interactive -auto-approve
          else
            terragrunt run-all apply --terragrunt-non-interactive -auto-approve
          fi
        env:
          TF_VAR_is_private_connection: ${{ inputs.connectivity == 'private' }}

  deploy-azure:
    name: Deploy Azure
    runs-on: ubuntu-latest
    if: contains(fromJSON('["azure","aws-azure","all"]'), inputs.cloud)
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Plan + Apply — Azure
        working-directory: environments/dev/azure
        run: |
          terragrunt run-all plan  --terragrunt-non-interactive
          terragrunt run-all apply --terragrunt-non-interactive -auto-approve
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-gcp:
    name: Deploy GCP
    runs-on: ubuntu-latest
    if: contains(fromJSON('["gcp","aws-gcp","all"]'), inputs.cloud)
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DBX_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform + Terragrunt
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip" -O tf.zip
          unzip -q tf.zip && mv terraform /usr/local/bin/
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -O /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Plan + Apply — GCP
        working-directory: environments/dev/gcp
        run: |
          terragrunt run-all plan  --terragrunt-non-interactive
          terragrunt run-all apply --terragrunt-non-interactive -auto-approve
