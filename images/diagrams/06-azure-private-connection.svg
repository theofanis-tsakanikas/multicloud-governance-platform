<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">Azure — Private Connectivity via an AWS transit hub</text><rect x="120.0" y="100" width="1360" height="32" rx="16.0" fill="#e7f6ec"/><text x="800.0" y="120.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#14532d" text-anchor="middle">An NCC rule can only create an AWS endpoint — so the endpoint is in AWS, and the tunnel does the rest.</text><line x1="1080" y1="190" x2="1080" y2="720" stroke="#9aa3b2" stroke-width="1.6" stroke-dasharray="7 6"/><text x="1080" y="182" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="middle">cloud boundary</text><rect x="52" y="368" width="168" height="124" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="136.0" y="421.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks</text><text x="136.0" y="439.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Serverless</text><text x="136.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">runs in AWS · NCC</text><text x="258" y="334" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="normal" fill="#16a34a" text-anchor="middle">NCC rule →</text><text x="258" y="347" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="normal" fill="#16a34a" text-anchor="middle">*.database.windows.net</text><line x1="228" y1="430" x2="288" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="258" cy="430" r="11" fill="#ffffff"/><path d="M 254 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="251.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="296" y="368" width="172" height="124" rx="10" fill="#f1ecfe" stroke="#7c3aed" stroke-width="2" filter="url(#soft)"/><text x="382.0" y="421.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">AWS PrivateLink</text><text x="382.0" y="439.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">VPC Endpoint Service</text><text x="382.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">allow-list: one role</text><line x1="476" y1="430" x2="528" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="502" cy="430" r="11" fill="#ffffff"/><path d="M 498 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="495.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="536" y="250" width="444" height="360" rx="14" fill="#fdf0e4" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><text x="552" y="272" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#ec7211" text-anchor="start">AWS transit VPC · 10.10.0.0/16 · private subnets</text><rect x="556" y="368" width="180" height="124" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="646.0" y="428.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">Internal NLB</text><text x="646.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">:1433</text><line x1="744" y1="430" x2="772" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="758" cy="430" r="11" fill="#ffffff"/><path d="M 754 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="751.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="780" y="368" width="180" height="124" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="870.0" y="421.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">ECS Fargate</text><text x="870.0" y="439.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">HAProxy</text><text x="870.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">TCP passthrough</text><text x="758" y="522" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" fill="#6b7280" text-anchor="middle">terminates nothing — the TLS session is</text><text x="758" y="538" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#6b7280" text-anchor="middle">Databricks ↔ Azure SQL, end to end</text><line x1="962" y1="430" x2="986" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><rect x="990" y="415.0" width="180" height="30" rx="15.0" fill="#0078d4" opacity="0.16"/><rect x="990" y="415.0" width="180" height="30" rx="15.0" fill="none" stroke="#0078d4" stroke-width="2"/><ellipse cx="1170" cy="430" rx="4.5" ry="15.0" fill="none" stroke="#0078d4" stroke-width="2" opacity="0.65"/><path d="M 1076.0 427 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1073.5" y="427" width="13" height="10" rx="2" fill="#16a34a"/><text x="1080.0" y="462.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078d4" text-anchor="middle">IPsec VPN</text><text x="1080" y="482" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#0078d4" text-anchor="middle">AWS VGW ↔ Azure VPN Gateway</text><text x="1080" y="497" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">VpnGw1AZ · zone-redundant · Connected</text><line x1="1174" y1="430" x2="1196" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><rect x="1200" y="250" width="348" height="360" rx="14" fill="#e8f2fc" stroke="#0078d4" stroke-width="1.5" opacity="0.95"/><text x="1216" y="272" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0078d4" text-anchor="start">Azure VNet</text><rect x="1218" y="368" width="148" height="124" rx="10" fill="#ffffff" stroke="#0078d4" stroke-width="2" filter="url(#soft)"/><text x="1292.0" y="428.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2a44" text-anchor="middle">Private Endpoint</text><text x="1292.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Approved</text><line x1="1372" y1="430" x2="1394" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="1383" cy="430" r="11" fill="#ffffff"/><path d="M 1379 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1376.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="1400" y="360" width="132" height="140" rx="10" fill="#ffffff" stroke="#0078d4" stroke-width="2" filter="url(#soft)"/><text x="1466.0" y="414.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Azure SQL</text><text x="1466.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">publicNetworkAccess</text><text x="1466.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle"></text><text x="1466.0" y="460.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">= Disabled</text><path d="M 1414 379 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#ffffff" stroke="#0078d4" stroke-width="2"/><path d="M 1414 379 a 13.0 7 0 0 0 26 0" fill="none" stroke="#0078d4" stroke-width="2"/><path d="M 1510 378 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1507.5" y="378" width="13" height="10" rx="2" fill="#16a34a"/><rect x="1289.4" y="543" width="169.2" height="18" rx="9" fill="#cfe6fa"/><text x="1374" y="555.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#0078d4" text-anchor="middle">schemas: inventory · orders</text><rect x="556" y="640" width="424" height="88" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="2" filter="url(#soft)"/><text x="768.0" y="682.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2a44" text-anchor="middle">Route 53 private zone</text><text x="768.0" y="700.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">database.windows.net → the private endpoint's IP</text><line x1="768" y1="636" x2="768" y2="606" stroke="#c9d1dc" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/><text x="768" y="752" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">the FQDN resolves to a private address — reachable only across the tunnel</text><rect x="480.0" y="846" width="640" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">The proxy does not terminate TLS. It forwards bytes it cannot read.</text>
</svg>
