<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">Why a transit hub</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">Databricks serverless runs inside an AWS account — and an NCC rule can only ever create an AWS endpoint</text><line x1="800" y1="140" x2="800" y2="810" stroke="#c9d1dc" stroke-width="1.5"/><text x="400" y="170" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#0f1e3d" text-anchor="middle">What Databricks can do</text><rect x="80" y="350" width="210" height="130" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="185.0" y="406.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks</text><text x="185.0" y="424.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Serverless</text><text x="185.0" y="438.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">(AWS account)</text><line x1="300" y1="300" x2="520" y2="300" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowg)"/><text x="410" y="288" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a" text-anchor="middle">NCC private endpoint rule</text><rect x="530" y="262" width="180" height="76" rx="10" fill="#f1faf4" stroke="#16a34a" stroke-width="2" filter="url(#soft)"/><text x="620.0" y="305.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">AWS resource</text><text x="720" y="307" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#16a34a" text-anchor="start">✓</text><line x1="300" y1="420" x2="462" y2="420" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowr)"/><rect x="482" y="372" width="12" height="96" rx="3" fill="#d8dce3"/><text x="488" y="428" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="23" font-weight="bold" fill="#dc2626" text-anchor="middle">✗</text><rect x="530" y="382" width="180" height="76" rx="10" fill="#f3f4f6" stroke="#c9d1dc" stroke-width="2" filter="url(#soft)"/><text x="620.0" y="425.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">Azure resource</text><line x1="300" y1="530" x2="462" y2="530" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowr)"/><rect x="482" y="482" width="12" height="96" rx="3" fill="#d8dce3"/><text x="488" y="538" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="23" font-weight="bold" fill="#dc2626" text-anchor="middle">✗</text><rect x="530" y="492" width="180" height="76" rx="10" fill="#f3f4f6" stroke="#c9d1dc" stroke-width="2" filter="url(#soft)"/><text x="620.0" y="535.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">GCP resource</text><text x="400" y="648" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#1f2a44" text-anchor="middle">An NCC rule can only ever create</text><text x="400" y="672" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#1f2a44" text-anchor="middle">an AWS endpoint.</text><text x="1200" y="170" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="19" font-weight="bold" fill="#0f1e3d" text-anchor="middle">So move the problem</text><rect x="860" y="350" width="180" height="130" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="950.0" y="413.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks</text><text x="950.0" y="431.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Serverless</text><line x1="1048" y1="415" x2="1094" y2="415" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowg)"/><rect x="1102" y="300" width="220" height="230" rx="14" fill="#fdf0e4" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><text x="1212" y="332" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#ec7211" text-anchor="middle">AWS transit hub</text><rect x="1120" y="350" width="184" height="46" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="1.5" filter="url(#soft)"/><text x="1212.0" y="378.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2a44" text-anchor="middle">PrivateLink service</text><rect x="1120" y="408" width="184" height="46" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="1.5" filter="url(#soft)"/><text x="1212.0" y="436.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2a44" text-anchor="middle">internal NLB</text><rect x="1120" y="466" width="184" height="46" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="1.5" filter="url(#soft)"/><text x="1212.0" y="494.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1f2a44" text-anchor="middle">Fargate proxy</text><rect x="1340" y="347.0" width="118" height="26" rx="13.0" fill="#0078d4" opacity="0.16"/><rect x="1340" y="347.0" width="118" height="26" rx="13.0" fill="none" stroke="#0078d4" stroke-width="2"/><ellipse cx="1458" cy="360" rx="4.5" ry="13.0" fill="none" stroke="#0078d4" stroke-width="2" opacity="0.65"/><path d="M 1395.0 357 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1392.5" y="357" width="13" height="10" rx="2" fill="#16a34a"/><text x="1399.0" y="390.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#0078d4" text-anchor="middle">IPsec VPN</text><rect x="1474" y="328" width="108" height="64" rx="10" fill="#e8f2fc" stroke="#0078d4" stroke-width="2" filter="url(#soft)"/><text x="1528.0" y="365.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">Azure SQL</text><rect x="1340" y="457.0" width="118" height="26" rx="13.0" fill="#1a8b4c" opacity="0.16"/><rect x="1340" y="457.0" width="118" height="26" rx="13.0" fill="none" stroke="#1a8b4c" stroke-width="2"/><ellipse cx="1458" cy="470" rx="4.5" ry="13.0" fill="none" stroke="#1a8b4c" stroke-width="2" opacity="0.65"/><path d="M 1395.0 467 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1392.5" y="467" width="13" height="10" rx="2" fill="#16a34a"/><text x="1399.0" y="500.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a8b4c" text-anchor="middle">IPsec VPN</text><rect x="1474" y="438" width="108" height="64" rx="10" fill="#e8f5ee" stroke="#1a8b4c" stroke-width="2" filter="url(#soft)"/><text x="1528.0" y="475.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">BigQuery</text><text x="1200" y="648" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks reaches AWS.</text><text x="1200" y="672" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#1f2a44" text-anchor="middle">AWS reaches everywhere.</text><rect x="230.0" y="846" width="1140" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">The private connection to another cloud is not hard — it does not exist. So I moved the problem to ground where it does.</text>
</svg>
