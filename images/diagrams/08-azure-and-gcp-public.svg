<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">Public Connectivity — Azure &amp; GCP</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">Two nodes and one hop per path. The simplicity is the point.</text><rect x="120.0" y="112" width="1360" height="32" rx="16.0" fill="#eef2f8"/><text x="800.0" y="132.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0f1e3d" text-anchor="middle">Same catalogs.  Same grants.  Same JSON contract.  The only thing that changes is the road.</text><rect x="90" y="360" width="280" height="150" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="230.0" y="419.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks Serverless</text><text x="230.0" y="437.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Workspace</text><text x="230.0" y="451.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Unity Catalog ·</text><text x="230.0" y="465.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Lakehouse Federation</text><path d="M 378 410 H 520 Q 560 410 560 372 V 300 H 660" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><g transform="translate(720,300) scale(1.15)"><path d="M -22 10 C -34 10 -34 -6 -21 -7 C -20 -21 0 -25 6 -13 C 15 -21 30 -12 24 1 C 31 3 30 10 23 10 Z" fill="#eef2f7" stroke="#d97706" stroke-width="1.8" stroke-linejoin="round"/></g><line x1="772" y1="300" x2="900" y2="300" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><circle cx="720" cy="262" r="11" fill="#ffffff"/><path d="M 716 260 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="713.5" y="260" width="13" height="10" rx="2" fill="#d97706"/><text x="720" y="348" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#d97706" text-anchor="middle">TLS 1433 · public endpoint</text><rect x="915" y="232" width="400" height="140" rx="10" fill="#e8f2fc" stroke="#0078d4" stroke-width="2" filter="url(#soft)"/><text x="1115.0" y="293.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Azure SQL</text><text x="1115.0" y="311.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">publicNetworkAccess = Enabled</text><text x="1115.0" y="325.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">firewall allow-list</text><path d="M 929 251 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#e8f2fc" stroke="#0078d4" stroke-width="2"/><path d="M 929 251 a 13.0 7 0 0 0 26 0" fill="none" stroke="#0078d4" stroke-width="2"/><path d="M 1293 250 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="1290.5" y="250" width="13" height="10" rx="2" fill="#d97706"/><rect x="1030.4" y="387" width="169.2" height="18" rx="9" fill="#cfe6fa"/><text x="1115" y="399.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#0078d4" text-anchor="middle">schemas: inventory · orders</text><path d="M 378 460 H 520 Q 560 460 560 498 V 570 H 660" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><g transform="translate(720,570) scale(1.15)"><path d="M -22 10 C -34 10 -34 -6 -21 -7 C -20 -21 0 -25 6 -13 C 15 -21 30 -12 24 1 C 31 3 30 10 23 10 Z" fill="#eef2f7" stroke="#d97706" stroke-width="1.8" stroke-linejoin="round"/></g><line x1="772" y1="570" x2="900" y2="570" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><circle cx="720" cy="532" r="11" fill="#ffffff"/><path d="M 716 530 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="713.5" y="530" width="13" height="10" rx="2" fill="#d97706"/><text x="720" y="618" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#d97706" text-anchor="middle">HTTPS 443 · googleapis.com</text><rect x="915" y="502" width="400" height="140" rx="10" fill="#e8f5ee" stroke="#1a8b4c" stroke-width="2" filter="url(#soft)"/><text x="1115.0" y="563.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">BigQuery</text><text x="1115.0" y="581.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">public API endpoint</text><text x="1115.0" y="595.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">IAM-authorised</text><path d="M 929 521 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#e8f5ee" stroke="#1a8b4c" stroke-width="2"/><path d="M 929 521 a 13.0 7 0 0 0 26 0" fill="none" stroke="#1a8b4c" stroke-width="2"/><path d="M 1293 520 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="1290.5" y="520" width="13" height="10" rx="2" fill="#d97706"/><rect x="988.4" y="657" width="253.2" height="18" rx="9" fill="#c9e9d6"/><text x="1115" y="669.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a8b4c" text-anchor="middle">datasets: analytics (internal) · web (PII)</text><text x="1400" y="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="start">no proxy</text><text x="1400" y="318" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="start">no tunnel</text><text x="1400" y="336" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="start">no PrivateLink</text><text x="1400" y="570" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="start">their absence</text><text x="1400" y="588" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="start">is the message</text><rect x="260.0" y="846" width="1080" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">In public mode the integration layer creates ZERO resources — an apply that finishes in seconds is not a failure.</text>
</svg>
