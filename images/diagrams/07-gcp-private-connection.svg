<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">GCP — Private Connectivity via an AWS transit hub</text><rect x="120.0" y="100" width="1360" height="32" rx="16.0" fill="#e7f6ec"/><text x="800.0" y="120.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#14532d" text-anchor="middle">BigQuery is a managed API — there is nothing to put a private endpoint in front of. So we reach Google's private VIP.</text><line x1="1080" y1="190" x2="1080" y2="700" stroke="#9aa3b2" stroke-width="1.6" stroke-dasharray="7 6"/><text x="1080" y="182" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9aa3b2" text-anchor="middle">cloud boundary</text><rect x="52" y="338" width="168" height="124" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="136.0" y="391.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks</text><text x="136.0" y="409.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Serverless</text><text x="136.0" y="423.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">runs in AWS · NCC</text><text x="258" y="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="normal" fill="#16a34a" text-anchor="middle">NCC rule → bigquery ·</text><text x="258" y="313" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="normal" fill="#16a34a" text-anchor="middle">bigquerystorage · oauth2</text><line x1="228" y1="400" x2="288" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="258" cy="400" r="11" fill="#ffffff"/><path d="M 254 398 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="251.5" y="398" width="13" height="10" rx="2" fill="#16a34a"/><text x="258" y="488" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#9aa3b2" text-anchor="middle">all three on one rule</text><rect x="296" y="338" width="172" height="124" rx="10" fill="#f1ecfe" stroke="#7c3aed" stroke-width="2" filter="url(#soft)"/><text x="382.0" y="398.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">AWS PrivateLink</text><text x="382.0" y="416.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">VPC Endpoint Service</text><line x1="476" y1="400" x2="528" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="502" cy="400" r="11" fill="#ffffff"/><path d="M 498 398 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="495.5" y="398" width="13" height="10" rx="2" fill="#16a34a"/><rect x="536" y="226" width="444" height="350" rx="14" fill="#fdf0e4" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><text x="552" y="248" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#ec7211" text-anchor="start">AWS transit VPC · 10.11.0.0/16</text><rect x="556" y="338" width="180" height="124" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="646.0" y="398.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">Internal NLB</text><text x="646.0" y="416.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">:443</text><line x1="744" y1="400" x2="772" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="758" cy="400" r="11" fill="#ffffff"/><path d="M 754 398 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="751.5" y="398" width="13" height="10" rx="2" fill="#16a34a"/><rect x="780" y="338" width="180" height="124" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="870.0" y="398.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">ECS Fargate</text><text x="870.0" y="416.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">HAProxy :8443</text><text x="758" y="490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">8443 — an unprivileged container cannot bind below 1024</text><text x="758" y="514" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#6b7280" text-anchor="middle">Pure TCP passthrough: TLS is Databricks ↔ Google, end to end.</text><text x="758" y="530" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">Google's frontend routes on the SNI the client sent — which is why</text><text x="758" y="546" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">ONE backend can carry all three API hosts.</text><line x1="962" y1="400" x2="986" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><rect x="990" y="385.0" width="180" height="30" rx="15.0" fill="#1a8b4c" opacity="0.16"/><rect x="990" y="385.0" width="180" height="30" rx="15.0" fill="none" stroke="#1a8b4c" stroke-width="2"/><ellipse cx="1170" cy="400" rx="4.5" ry="15.0" fill="none" stroke="#1a8b4c" stroke-width="2" opacity="0.65"/><path d="M 1076.0 397 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1073.5" y="397" width="13" height="10" rx="2" fill="#16a34a"/><text x="1080.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a8b4c" text-anchor="middle">IPsec VPN + BGP</text><text x="1080" y="452" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a8b4c" text-anchor="middle">AWS VGW ↔ GCP HA VPN</text><text x="1080" y="467" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">gcp-tunnel-to-aws · ESTABLISHED</text><line x1="1174" y1="400" x2="1196" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><rect x="1200" y="226" width="348" height="350" rx="14" fill="#e8f5ee" stroke="#1a8b4c" stroke-width="1.5" opacity="0.95"/><text x="1216" y="248" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a8b4c" text-anchor="start">GCP VPC</text><rect x="1216" y="324" width="316" height="88" rx="10" fill="#ffffff" stroke="#1a8b4c" stroke-width="2" filter="url(#soft)"/><text x="1374.0" y="366.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">private.googleapis.com VIP</text><text x="1374.0" y="384.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">199.36.153.8/30</text><line x1="1374" y1="416" x2="1374" y2="444" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="1374" cy="430" r="11" fill="#ffffff"/><path d="M 1370 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1367.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="1226" y="450" width="296" height="84" rx="10" fill="#ffffff" stroke="#1a8b4c" stroke-width="2" filter="url(#soft)"/><text x="1374.0" y="490.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">BigQuery</text><text x="1374.0" y="508.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">reached without touching the internet</text><path d="M 1240 469 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#ffffff" stroke="#1a8b4c" stroke-width="2"/><path d="M 1240 469 a 13.0 7 0 0 0 26 0" fill="none" stroke="#1a8b4c" stroke-width="2"/><path d="M 1500 468 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1497.5" y="468" width="13" height="10" rx="2" fill="#16a34a"/><rect x="1247.4" y="553" width="253.2" height="18" rx="9" fill="#c9e9d6"/><text x="1374" y="565.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a8b4c" text-anchor="middle">datasets: analytics (internal) · web (PII)</text><rect x="120" y="620" width="900" height="138" rx="14" fill="#fdf0f0" stroke="#dc2626" stroke-width="1.5" opacity="0.95"/><text x="146" y="652" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#dc2626" text-anchor="start">⚠   Cloud Router must ADVERTISE 199.36.153.8/30   (advertise_mode = CUSTOM)</text><text x="146" y="682" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="normal" fill="#1f2a44" text-anchor="start">Without it the tunnel is UP, BGP is Established, every route is active, the deploy is green —</text><text x="146" y="702" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#1f2a44" text-anchor="start">and the packets are silently dropped onto the public internet.</text><text x="146" y="730" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="start">I did not find it by reading status. I found it by counting bytes.</text><rect x="190.0" y="846" width="1220" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">BigQuery has no 'disable public access' switch. What is private here is the CONNECTION — not the disappearance of the public API.</text>
</svg>
