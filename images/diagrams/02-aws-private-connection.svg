<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">AWS — Private Connectivity (PrivateLink)</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">Five hops, all private — no Internet Gateway anywhere in the picture</text><rect x="120.0" y="112" width="1360" height="32" rx="16.0" fill="#e7f6ec"/><text x="800.0" y="132.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#14532d" text-anchor="middle">Every hop private  —  Databricks never leaves the AWS backbone</text><rect x="52" y="368" width="190" height="124" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="147.0" y="421.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks</text><text x="147.0" y="439.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Serverless Workspace</text><text x="147.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Unity Catalog · bound to NCC</text><text x="286" y="334" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" fill="#16a34a" text-anchor="middle">NCC private</text><text x="286" y="347" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" fill="#16a34a" text-anchor="middle">endpoint rule</text><line x1="250" y1="430" x2="322" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="286" cy="430" r="11" fill="#ffffff"/><path d="M 282 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="279.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><text x="286" y="518" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#6b7280" text-anchor="middle">postgres.db.internal</text><rect x="330" y="368" width="190" height="124" rx="10" fill="#f1ecfe" stroke="#7c3aed" stroke-width="2" filter="url(#soft)"/><text x="425.0" y="414.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">AWS PrivateLink</text><text x="425.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">VPC Endpoint Service</text><text x="425.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">allow-list: Databricks</text><text x="425.0" y="460.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">serverless role only</text><line x1="528" y1="430" x2="592" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="560" cy="430" r="11" fill="#ffffff"/><path d="M 556 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="553.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="600" y="250" width="950" height="450" rx="14" fill="#fdf0e4" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><text x="616" y="272" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#ec7211" text-anchor="start">Customer VPC · 10.40.0.0/16 · private subnets · NO Internet Gateway</text><rect x="618" y="372" width="162" height="116" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="699.0" y="428.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Internal NLB</text><text x="699.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">TCP 5432</text><rect x="800" y="372" width="162" height="116" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="881.0" y="428.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">ECS Fargate</text><text x="881.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">pgbouncer gateway</text><rect x="982" y="372" width="162" height="116" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="1063.0" y="428.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Amazon RDS Proxy</text><text x="1063.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">require_tls = true</text><line x1="780" y1="430" x2="800" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="790" cy="430" r="11" fill="#ffffff"/><path d="M 786 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="783.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><line x1="962" y1="430" x2="982" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="972" cy="430" r="11" fill="#ffffff"/><path d="M 968 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="965.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><line x1="1144" y1="430" x2="1176" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowg)"/><circle cx="1160" cy="430" r="11" fill="#ffffff"/><path d="M 1156 428 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1153.5" y="428" width="13" height="10" rx="2" fill="#16a34a"/><rect x="1190" y="352" width="336" height="156" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="1358.0" y="414.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Amazon RDS for PostgreSQL</text><text x="1358.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">sales-db-instance</text><text x="1358.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle"></text><text x="1358.0" y="460.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">publicly_accessible = FALSE</text><path d="M 1204 371 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#ffffff" stroke="#ec7211" stroke-width="2"/><path d="M 1204 371 a 13.0 7 0 0 0 26 0" fill="none" stroke="#ec7211" stroke-width="2"/><path d="M 1504 370 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1501.5" y="370" width="13" height="10" rx="2" fill="#16a34a"/><text x="1358" y="532" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" fill="#6b7280" text-anchor="middle">security group admits 5432 only from the gateway</text><rect x="690" y="570" width="440" height="96" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="2" filter="url(#soft)"/><text x="910.0" y="616.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">VPC Interface / Gateway Endpoints</text><text x="910.0" y="634.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Secrets Manager · ECR · CloudWatch Logs · S3</text><line x1="881" y1="490" x2="881" y2="566" stroke="#c9d1dc" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/><text x="1310" y="604" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="middle">…so the gateway needs no internet</text><text x="1310" y="622" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">to pull its image or read its secrets.</text><rect x="210.0" y="846" width="1180" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">PrivateLink allow-list = exactly one principal:  arn:aws:iam::565502421330:role/private-connectivity-role-eu-central-1</text>
</svg>
