<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">One contract. Three clouds. Two engines.</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="normal" fill="#9aa3b2" text-anchor="middle">Everything below flows down from a single JSON document.</text><path d="M 620 116 q0-8 8-8 h 334 l 18 18 v 70 q0 8 -8 8 h -352 q-8 0 -8 -8 Z" fill="#f1ecfe" stroke="#7c3aed" stroke-width="2"/><path d="M 962 108 v 18 h 18" fill="none" stroke="#7c3aed" stroke-width="2"/><text x="800.0" y="148" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">domain JSON — infra + grants + classification</text><text x="800.0" y="166" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">one file per domain · the only place governance is written</text><path d="M 800 206 V 222 H 420 V 244" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowv)"/><path d="M 800 206 V 222 H 800 V 244" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowv)"/><path d="M 800 206 V 222 H 1180 V 244" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowv)"/><rect x="80" y="248" width="1440" height="148" rx="14" fill="#f1ecfe" stroke="#7c3aed" stroke-width="1.5" opacity="0.95"/><text x="96" y="270" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#7c3aed" text-anchor="start">GOVERNED — offline, before anything is deployed</text><rect x="110" y="284" width="420" height="74" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#soft)"/><text x="320.0" y="319.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Policy analyzer</text><text x="320.0" y="337.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">least-privilege + PII gate</text><rect x="243.8" y="365" width="152.39999999999998" height="18" rx="9" fill="#fde8e8"/><text x="320" y="377.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#dc2626" text-anchor="middle">fails the PR on any HIGH</text><rect x="570" y="284" width="420" height="74" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#soft)"/><text x="780.0" y="319.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">OPA / Rego</text><text x="780.0" y="337.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">independent re-implementation</text><rect x="701.0" y="365" width="158.0" height="18" rx="9" fill="#ede9fe"/><text x="780" y="377.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#7c3aed" text-anchor="middle">cross-checks the analyzer</text><rect x="1030" y="284" width="420" height="74" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#soft)"/><text x="1240.0" y="319.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Cost + carbon estimate</text><text x="1240.0" y="337.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">multi-cloud + Databricks</text><rect x="1144.2" y="365" width="191.6" height="18" rx="9" fill="#ede9fe"/><text x="1240" y="377.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#7c3aed" text-anchor="middle">before a single resource exists</text><text x="800" y="412" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="middle">no cloud, no credentials — this runs on a laptop</text><rect x="80" y="428" width="1440" height="226" rx="14" fill="#f6f8fb" stroke="#c9d1dc" stroke-width="1.5" opacity="0.95"/><text x="96" y="450" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b7280" text-anchor="start">DEPLOYED — by Terragrunt, into three clouds</text><rect x="1196.2" y="436" width="303.59999999999997" height="18" rx="9" fill="#fbd7d2"/><text x="1348" y="448.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#ff3621" text-anchor="middle">public or private — a per-cloud flag, not a rewrite</text><rect x="110" y="462" width="1380" height="62" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="800.0" y="491.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks Unity Catalog — one metastore, one serverless workspace</text><text x="800.0" y="509.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">catalogs:  sales_rds_fed  ·  supply_sql_master  ·  marketing_bq_fed  ·  shared_gcp_delta_share</text><rect x="110" y="556" width="420" height="84" rx="10" fill="#fdf0e4" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="320.0" y="589.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">AWS</text><text x="320.0" y="607.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">S3 · RDS Postgres</text><text x="320.0" y="621.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">ECS · PrivateLink</text><line x1="320" y1="526" x2="320" y2="552" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><rect x="570" y="556" width="420" height="84" rx="10" fill="#e8f2fc" stroke="#0078d4" stroke-width="2" filter="url(#soft)"/><text x="780.0" y="589.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">Azure</text><text x="780.0" y="607.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">ADLS · Azure SQL</text><text x="780.0" y="621.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">VPN Gateway</text><line x1="780" y1="526" x2="780" y2="552" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><rect x="1030" y="556" width="420" height="84" rx="10" fill="#e8f5ee" stroke="#1a8b4c" stroke-width="2" filter="url(#soft)"/><text x="1240.0" y="589.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">GCP</text><text x="1240.0" y="607.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">GCS · BigQuery</text><text x="1240.0" y="621.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">HA VPN</text><line x1="1240" y1="526" x2="1240" y2="552" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><rect x="80" y="668" width="1440" height="150" rx="14" fill="#fdfaf6" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><rect x="100" y="688" width="250" height="78" rx="10" fill="#ffffff" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="225.0" y="725.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Medallion</text><text x="225.0" y="743.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">bronze → silver → gold</text><rect x="126.4" y="777" width="197.2" height="18" rx="9" fill="#fdecea"/><text x="225" y="789.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#ff3621" text-anchor="middle">PII minimised at the silver step</text><line x1="356" y1="727" x2="396" y2="727" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><rect x="404" y="688" width="300" height="78" rx="10" fill="#fdf0e4" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="554.0" y="725.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Amazon S3 · sales/gold-zone/</text><text x="554.0" y="743.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">executive_cross_cloud</text><path d="M 710 715 H 750 V 700 H 786" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><path d="M 710 739 H 750 V 754 H 786" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><rect x="794" y="676" width="250" height="48" rx="10" fill="#ffffff" stroke="#ff3621" stroke-width="1.5" filter="url(#soft)"/><text x="919.0" y="705.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks SQL</text><rect x="794" y="730" width="250" height="48" rx="10" fill="#ffffff" stroke="#29b5e8" stroke-width="1.5" filter="url(#soft)"/><text x="919.0" y="759.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#1f2a44" text-anchor="middle">Snowflake — external table, zero-copy</text><path d="M 1048 700 H 1080 V 727 H 1112" fill="none" stroke="#6b7280" stroke-width="2"/><path d="M 1048 754 H 1080 V 727 H 1112" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/><rect x="1120" y="688" width="380" height="78" rx="10" fill="#ffffff" stroke="#0f1e3d" stroke-width="2" filter="url(#soft)"/><text x="1310.0" y="725.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Executive dashboard</text><text x="1310.0" y="743.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">revenue · marketing ROI · stockout risk</text><rect x="460.0" y="838" width="680" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="860" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">The contract is the source. Everything else is a consequence.</text>
</svg>
