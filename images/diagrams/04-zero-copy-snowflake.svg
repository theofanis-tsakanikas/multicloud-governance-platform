<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">One Gold Layer, Two Engines, Zero Copies</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">The data is written once and read in place — no ingestion, no second copy, no divergence</text><rect x="120.0" y="112" width="1360" height="32" rx="16.0" fill="#f1ecfe"/><text x="800.0" y="132.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#4c1d95" text-anchor="middle">One JSON governance contract  →  enforced in BOTH Unity Catalog and Snowflake</text><rect x="70" y="340" width="300" height="170" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="220.0" y="416.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks</text><text x="220.0" y="434.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Medallion</text><text x="220.0" y="448.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">bronze → silver → gold</text><rect x="1230" y="340" width="300" height="170" rx="10" fill="#e6f6fd" stroke="#29b5e8" stroke-width="2" filter="url(#soft)"/><text x="1380.0" y="416.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1f2a44" text-anchor="middle">Snowflake</text><text x="1380.0" y="434.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">EXTERNAL TABLE</text><text x="1380.0" y="448.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">demo.executive_cross_cloud</text><rect x="620" y="285" width="360" height="285" rx="14" fill="#fdf0e4" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><text x="800" y="320" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#ec7211" text-anchor="middle">Amazon S3</text><text x="800" y="342" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" fill="#6b7280" text-anchor="middle">sales/gold-zone/</text><rect x="660" y="366" width="280" height="106" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="800.0" y="417.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2a44" text-anchor="middle">executive_cross_cloud</text><text x="800.0" y="435.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">.parquet — the one source of truth</text><rect x="662.2" y="501" width="275.59999999999997" height="18" rx="9" fill="#fbe3cc"/><text x="800" y="513.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#ec7211" text-anchor="middle">external location  =  stage  =  loc_sales_gold</text><text x="800" y="545" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">same name, same S3 prefix — both generated from the same contract</text><line x1="378" y1="419" x2="612" y2="419" stroke="#ff3621" stroke-width="2.5" marker-end="url(#arrow)"/><text x="495" y="380" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#ff3621" text-anchor="middle">writes once</text><text x="495" y="393" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#ff3621" text-anchor="middle">external location loc_sales_gold</text><line x1="1222" y1="419" x2="990" y2="419" stroke="#29b5e8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="1106" y="380" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#29b5e8" text-anchor="middle">reads in place · zero-copy</text><text x="1106" y="393" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#29b5e8" text-anchor="middle">STAGE loc_sales_gold</text><rect x="1120" y="600" width="400" height="76" rx="10" fill="#ffffff" stroke="#29b5e8" stroke-width="2" filter="url(#soft)"/><text x="1320.0" y="636.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">SELECT metadata$filename</text><text x="1320.0" y="654.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">→ resolves to the exact same S3 key</text><line x1="1320" y1="596" x2="1320" y2="520" stroke="#29b5e8" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowa)"/><rect x="80" y="600" width="400" height="76" rx="10" fill="#ffffff" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="280.0" y="636.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2a44" text-anchor="middle">sales_aws.gold.executive_cross_cloud</text><text x="280.0" y="654.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">the Databricks-side name of the same object</text><rect x="540.0" y="846" width="520" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Same file. Two engines. Zero copies.</text>
</svg>
