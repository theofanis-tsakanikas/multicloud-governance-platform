<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <!-- context-stroke: every arrowhead inherits the colour of its own line, so a
       red line can never end in a grey head. The ids are kept as aliases. -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 1 L 9 5 L 0 9 z" fill="context-stroke"/>
  </marker>
  <filter id="soft" x="-8%" y="-14%" width="116%" height="132%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1e3d" flood-opacity="0.07"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="0" y="0" width="1600" height="6" fill="#0f1e3d"/>
<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">AWS — Public Connectivity</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">Lakehouse Federation straight to the database's public endpoint</text><rect x="120.0" y="112" width="1360" height="32" rx="16.0" fill="#eef2f8"/><text x="800.0" y="132.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0f1e3d" text-anchor="middle">One JSON contract  →  grants enforced in Unity Catalog</text><rect x="80" y="340" width="260" height="180" rx="10" fill="#fdecea" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="210.0" y="407.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks Serverless</text><text x="210.0" y="425.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Workspace</text><text x="210.0" y="439.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle"></text><text x="210.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Unity Catalog ·</text><text x="210.0" y="467.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Lakehouse Federation</text><text x="530" y="312" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#d97706" text-anchor="middle">TLS 5432 · public endpoint</text><text x="530" y="325" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" fill="#d97706" text-anchor="middle">sslmode=require</text><line x1="350" y1="430" x2="478" y2="430" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><g transform="translate(530,430) scale(1.25)"><path d="M -22 10 C -34 10 -34 -6 -21 -7 C -20 -21 0 -25 6 -13 C 15 -21 30 -12 24 1 C 31 3 30 10 23 10 Z" fill="#eef2f7" stroke="#d97706" stroke-width="1.8" stroke-linejoin="round"/></g><line x1="582" y1="430" x2="686" y2="430" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><circle cx="530" cy="490" r="11" fill="#ffffff"/><path d="M 526 488 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="523.5" y="488" width="13" height="10" rx="2" fill="#d97706"/><text x="530" y="522" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#d97706" text-anchor="middle">the public internet</text><rect x="700" y="240" width="820" height="400" rx="14" fill="#fdf0e4" stroke="#ec7211" stroke-width="1.5" opacity="0.95"/><text x="716" y="262" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#ec7211" text-anchor="start">Customer VPC · 10.40.0.0/16</text><rect x="726" y="365" width="170" height="130" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="811.0" y="428.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Internet</text><text x="811.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Gateway</text><line x1="902" y1="430" x2="956" y2="430" stroke="#ec7211" stroke-width="2" marker-end="url(#arrow)"/><rect x="966" y="345" width="330" height="170" rx="10" fill="#ffffff" stroke="#ec7211" stroke-width="2" filter="url(#soft)"/><text x="1131.0" y="414.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Amazon RDS for PostgreSQL</text><text x="1131.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">sales-db-instance</text><text x="1131.0" y="446.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle"></text><text x="1131.0" y="460.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">publicly_accessible = true</text><path d="M 980 364 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#ffffff" stroke="#ec7211" stroke-width="2"/><path d="M 980 364 a 13.0 7 0 0 0 26 0" fill="none" stroke="#ec7211" stroke-width="2"/><path d="M 1274 363 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="1271.5" y="363" width="13" height="10" rx="2" fill="#d97706"/><rect x="1046.4" y="539" width="169.2" height="18" rx="9" fill="#fbe3cc"/><text x="1131" y="551.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#ec7211" text-anchor="middle">schemas: crm (PII) · orders</text><text x="1131" y="598" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#6b7280" text-anchor="middle">No load balancer. No proxy. No PrivateLink.</text><text x="1131" y="616" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="normal" fill="#6b7280" text-anchor="middle">This is the SIMPLE case — that is the whole point.</text><rect x="210.0" y="846" width="1180" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Simple, fast, enough for dev — but the bytes travel the public network. That is why private mode exists.</text>
</svg>
