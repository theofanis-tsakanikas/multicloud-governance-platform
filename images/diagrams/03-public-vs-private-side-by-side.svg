e, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">RDS PostgreSQL</text><text x="1377.0" y="620.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">publicly_accessible = FALSE</text><path d="M 1278 559 a 13.0 7 0 0 1 26 0 v 8 a 13.0 7 0 0 1 -26 0 Z" fill="#ffffff" stroke="#ec7211" stroke-width="2"/><path d="M 1278 559 a 13.0 7 0 0 0 26 0" fill="none" stroke="#ec7211" stroke-width="2"/><path d="M 1468 558 v-3.2 a4 4 0 0 1 8 0 v3.2" fill="none" stroke="#16a34a" stroke-width="1.9"/><rect x="1465.5" y="558" width="13" height="10" rx="2" fill="#16a34a"/><rect x="420.0" y="846" width="760" height="34" rx="17" fill="#0f1e3d"/><text x="800.0" y="868" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff" text-anchor="middle">I did not rewrite the platform. I flipped one flag.</text>
