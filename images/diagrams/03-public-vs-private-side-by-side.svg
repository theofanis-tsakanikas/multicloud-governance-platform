<text x="800.0" y="56" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="33" font-weight="bold" fill="#0f1e3d" text-anchor="middle" letter-spacing="-0.4">Same goal, one switch</text><text x="800.0" y="82" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="normal" fill="#9aa3b2" text-anchor="middle">PRIVATE_AWS = false  |  true   —   same source, same destination, same data</text><rect x="80" y="140" width="1440" height="250" rx="14" fill="#fdf6ec" stroke="#d97706" stroke-width="1.5" opacity="0.95"/><path d="M 112 174 v-3.2 a4 4 0 0 1 8 0" fill="none" stroke="#d97706" stroke-width="1.9"/><rect x="109.5" y="174" width="13" height="10" rx="2" fill="#d97706"/><text x="136" y="181" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#d97706" text-anchor="start">PUBLIC   ·   PRIVATE_AWS = false</text><text x="1490" y="181" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#d97706" text-anchor="end">2 nodes · 1 hop</text><rect x="180" y="232" width="240" height="116" rx="10" fill="#ffffff" stroke="#ff3621" stroke-width="2" filter="url(#soft)"/><text x="300.0" y="288.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2a44" text-anchor="middle">Databricks Serverless</text><text x="300.0" y="306.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" fill="#6b7280" text-anchor="middle">Unity Catalog · Federation</text><line x1="430" y1="290" x2="600" y2="290" stroke="#d97706" stroke-width="2" marker-end="url(#arrowa)"/><g transform="translate(660,290) scale(1.1)"><path d="M -22 10 C -34 10 -34 -6 -21 -7 C -20 -21 0 -25 6 -13 C 15 -21 30 -12 24 1 C 31 3 30 10 23 10 Z" fill="#eef2f7" stroke="#d97706" stroke-width="1.8" stroke-linejoin="round"/></g><line x1="715" y1="290" x2="900" y2="290" stroke="#d97706" stroke-width="2" marker-e