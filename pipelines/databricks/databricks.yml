# ============================================================================
# Databricks Asset Bundle (DAB) — the one-click medallion.
# ----------------------------------------------------------------------------
# `databricks bundle deploy` uploads these SQL files + the results notebook
# INTO your workspace and creates the Jobs below. Then you either click "Run
# now" on the Job in the Databricks UI, or `databricks bundle run medallion_aws`.
# No manual copy-paste — deploy once, click play.
#
# Multi-cloud: two Jobs on two workspaces (separate Databricks accounts).
#   · medallion_aws → AWS workspace: seed → medallion → executive (sales+supply)
#   · medallion_gcp → GCP workspace: seed → medallion (marketing) → Delta-shared
#
# Deploy per target:  ./bundle.sh deploy aws   |   ./bundle.sh deploy gcp
# Run per target:     ./bundle.sh run aws      |   ./bundle.sh run gcp
# ============================================================================

bundle:
  name: governance-medallion

# The bundle syncs this directory wholesale, and it has no idea whether the platform
# was deployed public or private. aws/private_proof_notebook.py asserts, in prose, that
# RDS has no public IP and that Azure SQL refuses the internet. In private mode that is
# true and demonstrable. In public mode it is false — the same cells would run, over the
# public path, under a heading claiming they did not.
#
# A notebook that lies confidently is worse than no notebook, so the bundle does not ship
# it. dbx-pipeline.yml imports it separately, and only after asking the infrastructure
# whether all three sources are actually private.
sync:
  exclude:
    - ./aws/private_proof_notebook.py

variables:
  warehouse_id:
    description: "SQL warehouse ID the medallion runs on (from your workspace)."

# The targets carry no `workspace.host`. The Databricks CLI refuses variable
# interpolation on authentication fields:
#
#   Interpolation is not supported for the field workspace.host. Please set the
#   DATABRICKS_HOST environment variable if you wish to configure this field at
#   runtime.
#
# which is exactly right, and exactly what the pipeline workflow already does: it
# reads the workspace URL from the bootstrap Terraform outputs and exports
# DATABRICKS_HOST. Hard-coding a host here would also mean committing two
# workspace URLs that change on every re-bootstrap.
#
# A target therefore selects WHICH jobs to deploy, not where. The where comes from
# the environment.
targets:
  aws:
    default: true
    # By default a bundle deploys under the DEPLOYING identity's home
    # (/Workspace/Users/<sp-id>/.bundle/...), which is a service principal here and
    # a hidden .bundle folder — invisible to anyone browsing the workspace. Pin it
    # to a shared, browsable location so the notebook and dashboard show up under
    # Workspace -> Shared, not buried under an SP nobody opens.
    workspace:
      root_path: /Workspace/Shared/${bundle.name}
    # The dashboard reads sales_aws / supplies_azure / the delta-shared GCP gold,
    # all of which live in the AWS metastore, so it belongs to the AWS target only.
    # A top-level resource would try to deploy to the GCP workspace too, where those
    # catalogs do not exist.
    resources:
      dashboards:
        executive:
          display_name: "[gov] Multi-Cloud Executive View"
          file_path: ./aws/executive.lvdash.json
          warehouse_id: ${var.warehouse_id}
  gcp:
    workspace:
      root_path: /Workspace/Shared/${bundle.name}

resources:
  jobs:
    medallion_aws:
      name: "[gov] Medallion — AWS (sales + supply + executive)"
      tasks:
        - task_key: seed
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: { path: ./aws/01_seed.sql }
        - task_key: medallion
          depends_on: [{ task_key: seed }]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: { path: ./aws/02_medallion.sql }
        - task_key: executive
          depends_on: [{ task_key: medallion }]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: { path: ./aws/03_executive.sql }

    medallion_gcp:
      name: "[gov] Medallion — GCP (marketing)"
      tasks:
        - task_key: seed
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: { path: ./gcp/01_seed.sql }
        - task_key: medallion
          depends_on: [{ task_key: seed }]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: { path: ./gcp/02_medallion.sql }

# The results notebook (aws/results_notebook.py) and the dashboard queries
# (aws/04_dashboard_queries.sql) are synced into the workspace by the bundle too,
# so they show up ready to open. results_notebook.py ONLY queries the gold tables
# (it does not build anything) — open it and click through for the recording.
