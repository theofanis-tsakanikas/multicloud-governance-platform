repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        args: ["--args=-recursive"]
      - id: terraform_validate
        args:
          - "--args=-json"
      - id: terragrunt_fmt
      - id: terraform_checkov
        args:
          - "--args=--quiet"
          - "--args=--compact"
          - "--args=--framework terraform"
      - id: terraform_tfsec
        args:
          - "--args=--soft-fail=false"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: check-json
        files: environments/dev/domains/

  # Offline domain-config validation (stdlib-only — no cloud creds, no deps).
  - repo: local
    hooks:
      - id: validate-domains
        name: validate domain governance config
        entry: python3 scripts/validate_domains.py
        language: system
        pass_filenames: false
        files: ^(environments/dev/domains/|environments/dev/.*/data_platform/dbx_governance/terragrunt\.hcl$|scripts/validate_domains\.py$)
